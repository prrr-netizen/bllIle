<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLDEN ELITE | OFFICIAL NETWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #030509; --panel: rgba(13, 20, 35, 0.9); --border: rgba(0, 255, 204, 0.3); --text: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; font-family: 'Noto Sans KR', sans-serif; outline: none; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 25px; }

        /* 상단 상태바 */
        .top-bar { background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 11px; color: #888; letter-spacing: 0.5px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .status-online { color: #00ff41; font-weight: bold; text-shadow: 0 0 8px #00ff41; }

        /* 헤더 */
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(3, 5, 9, 0.95); backdrop-filter: blur(25px); border-bottom: 2px solid var(--neon); padding: 18px 0; }
        .logo { font-size: 26px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .logo span { color: var(--neon); }
        .nav-btns { display: flex; gap: 12px; }

        /* 버튼 디자인 */
        .btn { padding: 10px 22px; border-radius: 6px; font-size: 14px; font-weight: 800; cursor: pointer; border: none; transition: 0.3s; }
        .btn-join { background: var(--neon); color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        .btn-join:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); }
        .btn-login { background: transparent; color: #fff; border: 1px solid var(--border); }

        /* 메인 배너 영역 */
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 40px; margin: 50px auto; }
        .banner-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
        
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.4s; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        
        /* 배너 이미지 크기 최적화 */
        .card-img-wrap { width: 100%; height: 140px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid var(--border); }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img-wrap img { transform: scale(1.1); }

        .card-body { padding: 20px; text-align: center; }
        .card-name { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 15px; }
        .btn-go { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--neon); color: var(--neon); border-radius: 6px; font-size: 13px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-go:hover { background: var(--neon); color: #000; }

        /* 사이드바 */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .widget { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }
        .widget-h { font-size: 13px; font-weight: 900; color: var(--neon); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .log-item { font-size: 12px; color: #666; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; }

        /* 회원가입 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: #0b1019; width: 400px; padding: 40px; border-radius: 20px; border: 1px solid var(--neon); text-align: center; }
        .modal-h { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 30px; }
        .input-f { width: 100%; padding: 15px; background: #05070a; border: 1px solid #222; border-radius: 8px; color: #fff; margin-bottom: 15px; }
        .captcha-flex { display: flex; gap: 10px; margin-bottom: 20px; }
        .cap-box { flex: 1; background: #1e2633; color: var(--neon); font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; letter-spacing: 5px; border-radius: 8px; }

        @media (max-width: 1100px) { .banner-grid { grid-template-columns: repeat(2, 1fr); } .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false">

<div class="top-bar">
    <div class="container flex-between">
        <div>GLOBAL SERVER: <span class="status-online">● ONLINE</span></div>
        <div>실시간 접속자: <span id="user-count" style="color:#fff">1,842</span>명</div>
    </div>
</div>

<header class="header">
    <div class="container flex-between">
        <div class="logo">GOLDEN<span>ELITE</span></div>
        <div class="nav-btns">
            <button class="btn btn-login" onclick="openModal()">로그인</button>
            <button class="btn btn-join" onclick="openModal()">회원가입</button>
        </div>
    </div>
</header>

<main class="container">
    <div class="main-layout">
        <section>
            <h3 style="margin-bottom:20px; font-size:15px; color:#555;">인증된 파트너 네트워크</h3>
            <div class="banner-grid" id="render-target">
                </div>
        </section>

        <aside class="sidebar">
            <div class="widget">
                <div class="widget-h">실시간 접속 로그</div>
                <div id="log-list"></div>
            </div>
            <div class="widget">
                <div class="widget-h">보안 상태</div>
                <p style="font-size:12px; color:#555;">강력한 256비트 암호화가 적용된 안전한 플랫폼입니다.</p>
            </div>
        </aside>
    </div>
</main>

<div class="modal" id="authModal">
    <div class="modal-box">
        <div class="modal-h">회원가입 / 로그인</div>
        <input type="text" class="input-f" placeholder="아이디">
        <input type="password" class="input-f" placeholder="비밀번호">
        <div class="captcha-flex">
            <div class="cap-box" id="cap-code">0000</div>
            <input type="text" class="input-f" style="width:120px; margin:0;" placeholder="인증코드" id="cap-input">
        </div>
        <button class="btn-join btn" style="width:100%; padding:18px;" onclick="checkAuth()">인증 및 입장하기</button>
        <p onclick="closeModal()" style="margin-top:20px; color:#444; cursor:pointer; font-size:12px;">창 닫기</p>
    </div>
</div>

<script>
    /* [관리자 설정]
       이미지 주소(i)와 이동 주소(url)를 아래 형식에 맞춰 수정하세요.
       이미지 권장 사이즈: 400x280 (PNG, JPG, GIF 모두 가능)
    */
    const _PARTNERS = [
        {n:"스테이크", i:"https://via.placeholder.com/400x280/111/00ffcc?text=STAKE", url:"https://www.google.com"},
        {n:"로얄카지노", i:"https://via.placeholder.com/400x280/111/00ffcc?text=ROYAL", url:"#"},
        {n:"1XBET", i:"https://via.placeholder.com/400x280/111/00ffcc?text=1XBET", url:"#"},
        {n:"BC게임", i:"https://via.placeholder.com/400x280/111/00ffcc?text=BC.GAME", url:"#"},
        {n:"타이탄", i:"https://via.placeholder.com/400x280/111/00ffcc?text=TITAN", url:"#"},
        {n:"엠파이어", i:"https://via.placeholder.com/400x280/111/00ffcc?text=EMPIRE", url:"#"},
        {n:"스카이", i:"https://via.placeholder.com/400x280/111/00ffcc?text=SKY", url:"#"},
        {n:"에이스", i:"https://via.placeholder.com/400x280/111/00ffcc?text=ACE", url:"#"}
    ];

    const render = () => {
        document.getElementById('render-target').innerHTML = _PARTNERS.map(p => `
            <div class="card">
                <div class="card-img-wrap"><img src="${p.i}" alt="banner"></div>
                <div class="card-body">
                    <div class="card-name">${p.n}</div>
                    <button class="btn-go" onclick="goLink('${p.n}', '${p.url}')">사이트 입장</button>
                </div>
            </div>
        `).join('');
    };

    const goLink = (n, u) => {
        if(u === "#") { alert("준비 중인 파트너사입니다."); return; }
        if(confirm(`[ ${n} ] 공식 사이트로 안전하게 이동하시겠습니까?`)) window.open(u, '_blank');
    };

    /* 모달 & 인증 */
    let _CAP = "";
    const openModal = () => {
        document.getElementById('authModal').style.display = 'flex';
        _CAP = Math.floor(1000 + Math.random()*9000);
        document.getElementById('cap-code').innerText = _CAP;
    };
    const closeModal = () => document.getElementById('authModal').style.display = 'none';
    const checkAuth = () => {
        if(document.getElementById('cap-input').value == _CAP) alert("인증되었습니다. 환영합니다!");
        else { alert("인증코드가 일치하지 않습니다."); openModal(); }
    };

    /* 실시간 로그 */
    setInterval(() => {
        const logs = document.getElementById('log-list');
        const d = document.createElement('div');
        d.className = 'log-item';
        d.innerHTML = `<span>익명 유저 접속 중...</span> <span>방금 전</span>`;
        logs.prepend(d);
        if(logs.children.length > 10) logs.lastElementChild.remove();
        document.getElementById('user-count').innerText = (1800 + Math.floor(Math.random()*100)).toLocaleString();
    }, 3000);

    /* -----------------------------------------------------------
       🛡️ 99% 철벽 보안 (개발자 도구 원천 봉쇄)
    ----------------------------------------------------------- */
    (function(){
        // 1. F12, 우클릭, 소스보기 원천 차단
        window.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                alert("보안 정책에 따라 시스템 접근이 차단되었습니다.");
                return false;
            }
        };

        // 2. 무한 디버거 루프 (브라우저 일시정지 트랩)
        const d = function() {
            try { (function() { return (function(a) { return (function(res) { return res.constructor("debugger")(); })(a); })(function() { }); })(); } catch (e) { }
            setTimeout(d, 50);
        };
        d();

        // 3. 콘솔 분석 방해 (가짜 메시지 무한 출력 및 화면 파괴)
        setInterval(() => {
            const before = new Date().getTime();
            debugger;
            const after = new Date().getTime();
            if(after - before > 100) {
                document.body.innerHTML = "<div style='background:#000; color:red; height:100vh; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:900;'>ACCESS DENIED: SECURITY BREACH DETECTED</div>";
            }
        }, 500);
    })();

    render();
</script>
</body>
</html>
