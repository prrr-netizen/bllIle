<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공식 검증 리스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans KR", sans-serif;
            user-select: none;
        }
        body {
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ._top_bar {
            background: #000;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-bottom: 1px solid #1a1a25;
        }
        ._top_btn {
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 999px;
            transition: 0.25s;
        }
        ._btn_disc { background: #5865F2; color: #fff; }
        ._btn_inq { background: #f0b400; color: #000; }
        ._top_btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(0,0,0,0.5);
        }
        header {
            position: sticky;
            top: 0;
            background: rgba(8, 8, 13, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 180, 0, 0.25);
            z-index:10;
        }
        ._hi {
            max-width: 1400px;
            margin: auto;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        ._logo {
            font-size: 24px;
            font-weight: bold;
            color: #f0b400;
            text-decoration: none;
        }
        ._oc_box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 99px;
            font-size:13px;
        }
        ._oc_dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        #_clock{
            font-variant-numeric:tabular-nums;
        }
        ._notice_w {
            background: rgba(240, 180, 0, 0.1);
            padding: 10px 0;
            overflow: hidden;
        }
        ._notice_t {
            display: flex;
            gap: 100px;
            animation: marquee 35s linear infinite;
            white-space: nowrap;
        }
        ._notice_t span {
            font-size: 14px;
            color: rgba(255, 180, 0, 0.8);
            font-weight: 600;
        }
        ._main_wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .ITEM_CARD {
            background: #14141e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        ._item_rank {
            width: 80px;
            font-size: 36px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        ._item_img {
            width: 100px;
            height: auto;
            margin-right: 15px;
        }
        ._item_img img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        ._item_info {
            flex: 1;
            padding: 0 15px;
        }
        ._item_name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        ._enter_btn {
            background: #f0b400;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 10px;
            transition: background 0.3s;
        }
        ._enter_btn:hover {
            background: #e0a800;
        }
        #_admin_panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: #111;
            border: 2px solid #f0b400;
            padding: 30px;
            z-index: 2000;
            border-radius: 20px;
            box-shadow: 0 0 50px #000;
        }
        .admin_input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .admin_submit {
            width: 100%;
            padding: 15px;
            background: #f0b400;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .admin_submit:hover {
            background: #e0a800;
        }
        ._toast_wrap{
            position:fixed;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            z-index:3000;
            pointer-events:none;
        }
        ._toast_item{
            min-width:220px;
            max-width:260px;
            margin-top:8px;
            padding:10px 16px;
            border-radius:999px;
            background:rgba(15,15,25,0.95);
            border:1px solid rgba(240,180,0,0.7);
            color:#fef3c7;
            font-size:13px;
            box-shadow:0 8px 20px rgba(0,0,0,0.7);
            display:flex;
            align-items:center;
            gap:8px;
            animation:toastUp 0.4s ease-out, toastFade 0.4s ease-in forwards;
            animation-delay:0s,2.2s;
        }
        ._toast_dot{
            width:8px;
            height:8px;
            border-radius:50%;
            background:#4ade80;
            box-shadow:0 0 8px #4ade80;
        }
        @keyframes toastUp{
            from{transform:translate(-50%,20px); opacity:0;}
            to{transform:translate(-50%,0); opacity:1;}
        }
        @keyframes toastFade{
            to{opacity:0; transform:translate(-50%,-10px);}
        }
        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @media(max-width: 960px) {
            .ITEM_CARD {
                flex-direction: column;
                align-items: flex-start;
            }
            ._item_rank {
                width: auto;
                text-align: left;
            }
            ._item_img {
                width: 100%;
                height: auto;
                margin-bottom: 10px;
            }
            ._enter_btn {
                width: auto;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
<div class="_top_bar">
    <a href="https://discord.gg/예시" target="_blank" class="_top_btn _btn_disc">디스코드 채널</a>
    <a href="https://open.kakao.com/o/예시" target="_blank" class="_top_btn _btn_inq">입점 문의</a>
</div>

<header>
    <div class="_hi">
        <a href="/" class="_logo">AD MASTER</a>
        <div class="_oc_box">
            <span class="_oc_dot"></span>
            <span id="_clock">--:--:--</span>
        </div>
    </div>
</header>

<div class="_notice_w">
    <div class="_notice_t" id="_notice_list"></div>
</div>

<div class="_main_wrapper">
    <main id="_item_list"></main>
</div>

<div id="_admin_panel">
    <h2 style="text-align: center; margin-bottom: 20px;">관리자 모드</h2>
    <input type="text" id="_n" class="admin_input" placeholder="업체명" required>
    <input type="text" id="_i" class="admin_input" placeholder="이미지 URL" required>
    <input type="text" id="_u" class="admin_input" placeholder="이동 링크" required>
    <button class="admin_submit" onclick="_addItem()">등록하기</button>
    <button onclick="_closeAdmin()" style="width: 100%; margin-top: 10px; background: none; color: #555; border: none; cursor: pointer;">닫기</button>
    <div id="_adm_list" style="margin-top: 20px; max-height: 150px; overflow-y: auto;"></div>
</div>

<div class="_toast_wrap" id="_toast_wrap"></div>

<script>
let _DB = JSON.parse(localStorage.getItem('_AD_DATA_') || '[]');

window.onload = () => {
    _render();
    _initNotice();
    _initClock();
};

document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
});

async function _openAdminWithPassword() {
    const p = prompt('관리자 비밀번호');
    if (p === null || p === "") return;

    try {
        const res = await fetch('/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: p })
        });

        const data = await res.json();

        if (res.ok && data.ok) {
            document.getElementById('_admin_panel').style.display = 'block';
            _renderA();
        } else {
            alert('비밀번호가 올바르지 않습니다.');
        }
    } catch (e) {
        alert('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    }
}

document.addEventListener('keydown', (e) => {
    const k = e.keyCode;

    if (k === 123) {
        e.preventDefault();
    }

    if (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(k)) {
        e.preventDefault();
    }

    if (e.ctrlKey && k === 85) {
        e.preventDefault();
    }

    if (e.ctrlKey && e.shiftKey && k === 89) {
        _openAdminWithPassword();
    }
});

(function(){
    const t = 220;
    function c() {
        const w = window.outerWidth - window.innerWidth;
        const h = window.outerHeight - window.innerHeight;
        if (w > t || h > t) {
            location.href = 'about:blank';
        }
    }
    window.addEventListener('resize', c);
    window.addEventListener('load', c);
    window.addEventListener('focus', c);
})();

function _render() {
    const list = document.getElementById('_item_list');
    if (!_DB.length) {
        list.innerHTML = '<div style="text-align:center; padding:100px; color:#333">등록된 업체가 없습니다.</div>';
        return;
    }
    list.innerHTML = _DB.map((i, idx) => `
        <div class="ITEM_CARD">
            <div class="_item_rank">${idx + 1}</div>
            <div class="_item_img">
                <img src="${i.img}" onerror="this.src='https://via.placeholder.com/100';" alt="${i.name} 이미지">
            </div>
            <div class="_item_info">
                <div class="_item_name">${i.name}</div>
                <div style="color:#4ade80; font-size: 12px;">검증완료</div>
            </div>
            <a href="${i.url}" target="_blank" class="_enter_btn">입장하기</a>
        </div>
    `).join('');
}

function _addItem() {
    const n = document.getElementById('_n').value.trim();
    const i = document.getElementById('_i').value.trim();
    const u = document.getElementById('_u').value.trim();
    if (!n || !i || !u) return;

    _DB.push({ name: n, img: i, url: u });
    localStorage.setItem('_AD_DATA_', JSON.stringify(_DB));

    _render();
    _renderA();

    _toast(n + ' 등록 되었습니다');

    document.getElementById('_n').value = '';
    document.getElementById('_i').value = '';
    document.getElementById('_u').value = '';
}

function _renderA() {
    document.getElementById('_adm_list').innerHTML = _DB.map((i, idx) => `
        <div style="display: flex; justify-content: space-between; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 5px;">
            <span>${i.name}</span>
            <span onclick="_del(${idx})" style="color: #ff4d4d; cursor: pointer;">삭제</span>
        </div>
    `).join('');
}

function _del(idx) {
    _DB.splice(idx, 1);
    localStorage.setItem('_AD_DATA_', JSON.stringify(_DB));
    _render();
    _renderA();
    _toast('삭제 완료');
}

function _initNotice() {
    const m = ['실시간 모니터링 중', '사칭 사이트 주의', '입점 문의는 상단 확인'];
    document.getElementById('_notice_list').innerHTML =
        m.concat(m).map(t => `<span>● ${t}</span>`).join('');
}

function _initClock(){
    const el = document.getElementById('_clock');
    if(!el) return;
    function tick(){
        const now = new Date();
        const hh = String(now.getHours()).padStart(2,'0');
        const mm = String(now.getMinutes()).padStart(2,'0');
        const ss = String(now.getSeconds()).padStart(2,'0');
        el.textContent = hh+':'+mm+':'+ss;
    }
    tick();
    setInterval(tick,1000);
}

function _toast(msg){
    const wrap = document.getElementById('_toast_wrap');
    if(!wrap) return;

    const el = document.createElement('div');
    el.className = '_toast_item';
    el.innerHTML = '<span class="_toast_dot"></span><span>'+msg+'</span>';
    wrap.appendChild(el);

    setTimeout(()=>{
        el.remove();
    }, 2800);
}

function _closeAdmin() {
    document.getElementById('_admin_panel').style.display = 'none';
}
</script>
</body>
</html>
