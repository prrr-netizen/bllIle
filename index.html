<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>디스코드 배너 입점 | 검증된 파트너</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0c1a 0%, #0e1122 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #eef2ff;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 18px 0;
            backdrop-filter: blur(12px);
            background: rgba(10,12,26,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #5865F2, #9b87f5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: #1e243f;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #9b87f5;
            border: 1px solid rgba(88,101,242,0.4);
        }

        .nav a {
            color: #b9c7d9;
            text-decoration: none;
            margin-left: 28px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav a:hover {
            color: #5865F2;
        }

        .clock-container {
            text-align: center;
            padding: 24px 0 16px;
        }

        .live-clock {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(88,101,242,0.12);
            backdrop-filter: blur(8px);
            padding: 8px 28px;
            border-radius: 60px;
            border: 1px solid rgba(88,101,242,0.3);
        }

        .clock-time {
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .hero {
            padding: 50px 0 40px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #9b87f5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 1.1rem;
            color: #9aaec5;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.03);
            padding: 12px 24px;
            border-radius: 60px;
            min-width: 140px;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #5865F2;
        }

        /* 버튼 섹션 - 위쪽에 깔끔하게 */
        .button-section {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 40px 0 50px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #5865F2;
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #4752c4;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(88,101,242,0.2);
            border: 1px solid #5865F2;
            padding: 14px 40px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            background: #5865F2;
            transform: scale(0.98);
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 20px 0 12px;
            text-align: center;
        }

        .banner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 28px;
            margin-bottom: 60px;
        }

        .banner-card {
            background: #0f1424;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #1e2a3a;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .banner-card:hover {
            transform: translateY(-6px);
            border-color: #5865F2;
        }

        .banner-image {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #1a1f35, #0f1424);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .banner-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-image .placeholder {
            font-size: 2.5rem;
            color: #5865F2;
        }

        .banner-info {
            padding: 20px;
        }

        .banner-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .verify-badge {
            background: #1f3a2c;
            color: #8bd96b;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .banner-desc {
            color: #9aaec5;
            font-size: 0.85rem;
            margin: 12px 0;
        }

        .btn-banner {
            background: #5865F2;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            color: white;
        }

        .btn-banner:hover {
            background: #4752c4;
        }

        .footer {
            border-top: 1px solid #1a1f2e;
            padding: 32px 0;
            text-align: center;
            color: #6a7c9e;
            font-size: 0.75rem;
        }

        @media (max-width: 720px) {
            .hero h1 {
                font-size: 1.8rem;
            }
            .nav {
                display: none;
            }
            .button-section {
                gap: 16px;
            }
            .btn-primary, .btn-secondary {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
            .banner-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo">🎯 BANNER MARKET</div>
        <div class="nav">
            <a href="#">배너광고</a>
            <a href="#">입점문의</a>
            <a href="#">검증기준</a>
        </div>
        <div class="badge">✅ 검증된 파트너만 입점</div>
    </div>
</header>

<main>
    <div class="container">
        <div class="clock-container">
            <div class="live-clock">
                <span>🕒</span>
                <span class="clock-time" id="kstTime">--:--:--</span>
                <span>KST</span>
            </div>
        </div>

        <div class="hero">
            <h1>검증된 디스코드 업체<br>배너 광고 플랫폼</h1>
            <p>신뢰할 수 있는 파트너사만 엄선하여 배너를 게재합니다.</p>
            <div class="stats">
                <div class="stat-item"><div class="stat-number">12+</div><div>입점 업체</div></div>
                <div class="stat-item"><div class="stat-number">99%</div><div>검증 통과율</div></div>
                <div class="stat-item"><div class="stat-number">24/7</div><div>모니터링</div></div>
            </div>
        </div>

        <!-- 버튼 섹션: 깔끔하게 위쪽에 배치 -->
        <div class="button-section">
            <button class="btn-primary" id="applyBtn">📝 배너 입점 신청하기</button>
            <button class="btn-secondary" id="ctaBtn">🏷️ 전체 배너 보기 (9개)</button>
        </div>

        <div>
            <h2 class="section-title">🏆 검증된 배너 파트너</h2>
            <div class="banner-grid" id="bannerGrid"></div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>© BANNER MARKET — 검증된 디스코드 파트너사만 입점합니다.</p>
    </div>
</footer>

<script>
    // 실시간 시계
    function updateClock() {
        const now = new Date();
        const kstNow = new Date(now.getTime() + (9 * 60 * 60 * 1000));
        document.getElementById('kstTime').textContent = 
            `${String(kstNow.getUTCHours()).padStart(2,'0')}:${String(kstNow.getUTCMinutes()).padStart(2,'0')}:${String(kstNow.getUTCSeconds()).padStart(2,'0')}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ============================================================
    // 👇 관리자가 배너를 넣는 곳 (imgUrl에 GIF/이미지 URL 입력)
    // ============================================================
    let banners = [
        { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example1" },
        { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example2" },
        { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example3" }
    ];

    let isExpanded = false;

    function renderBanners() {
        const grid = document.getElementById('bannerGrid');
        grid.innerHTML = '';
        banners.forEach((banner, idx) => {
            const card = document.createElement('div');
            card.className = 'banner-card';
            card.setAttribute('data-url', banner.link);
            
            const imageHtml = banner.imgUrl && banner.imgUrl.trim() !== ""
                ? `<img src="${banner.imgUrl}" alt="${banner.name} 배너" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'placeholder\'>🎯</div>';">`
                : `<div class="placeholder">${['🎯', '🎮', '💎'][idx % 3]}</div>`;
            
            card.innerHTML = `
                <div class="banner-image">${imageHtml}</div>
                <div class="banner-info">
                    <div class="banner-name">
                        ${banner.name}
                        <span class="verify-badge">검증완료</span>
                    </div>
                    <div class="banner-desc">${banner.desc}</div>
                    <button class="btn-banner">배너 바로가기</button>
                </div>
            `;
            
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-banner')) return;
                if (banner.link && !banner.link.includes('example')) {
                    window.open(banner.link, '_blank');
                } else {
                    alert('🔜 준비 중인 배너입니다.');
                }
            });
            
            const btn = card.querySelector('.btn-banner');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (banner.link && !banner.link.includes('example')) {
                    window.open(banner.link, '_blank');
                } else {
                    alert('🔜 준비 중인 배너입니다.');
                }
            });
            
            grid.appendChild(card);
        });
    }

    // 전체보기 버튼
    document.getElementById('ctaBtn').addEventListener('click', () => {
        if (!isExpanded) {
            const additional = [
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example4" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example5" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example6" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example7" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example8" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example9" }
            ];
            banners = [...banners, ...additional];
            isExpanded = true;
            renderBanners();
            document.getElementById('ctaBtn').textContent = '🏷️ 전체 배너 보기 (9개) ✅';
            document.getElementById('ctaBtn').style.background = '#2a5f3a';
            document.getElementById('ctaBtn').style.border = 'none';
        } else {
            alert('✅ 이미 9개의 모든 배너가 표시되고 있습니다.');
        }
    });

    // 입점 신청 버튼
    document.getElementById('applyBtn').addEventListener('click', () => {
        alert('📢 배너 입점 문의\n\n검증된 디스코드 업체만 입점 가능합니다.\n자세한 문의는 관리자에게 연락해주세요.');
    });

    renderBanners();
</script>
</body>
</html>
