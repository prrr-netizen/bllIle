<!DOCTYPE html>

    <title>RLNL OFFICIAL NETWORK</title>
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10,15,25,0.98); --r: #ff0033; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; font-family:'Noto Sans KR', sans-serif; }
        body { background:var(--b); color:#fff; min-height:100vh; overflow-x:hidden; }
        #S_LOCK { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:#000; font-weight:900; font-size:24px; }
        header { width:100%; background:rgba(2,4,8,0.98); border-bottom:3px solid var(--n); padding:15px 40px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; }
        .LOGO { font-size:32px; font-weight:900; } .LOGO span { color:var(--n); }
        .M_C { max-width:1650px; margin:40px auto; padding:0 20px; display:grid; grid-template-columns: 1fr 340px; gap:30px; }
        .G_B { display:grid; grid-template-columns:repeat(2, 1fr); gap:25px; } 
        .CARD { background:linear-gradient(145deg, #0d121d, #020408); border:2px solid #1a2233; border-radius:12px; overflow:hidden; position:relative; }
        .B_NAME { background: rgba(0,255,204,0.05); color: #fff; padding: 12px 20px; font-weight: 900; font-size: 19px; border-bottom: 1px solid #1a2233; }
        .IMG_BOX { width:100%; height:200px; background:#000; overflow:hidden; }
        .IMG_BOX img { width:100%; height:100%; object-fit:cover; }
        .GO_BTN { display:block; width:92%; margin:15px auto; padding:14px; background:linear-gradient(to right, #00ffcc, #00ccaa); color:#000; text-align:center; text-decoration:none; font-weight:900; border-radius:8px; }
        .SIDE { background:rgba(10,15,25,0.9); border:2px solid #1a2233; border-radius:12px; padding:25px; height:680px; }
    </style>
</head>

<script>
(function(){
    // 🛡️ 보안 로직: 소스 탭 누르는 즉시 파괴 ㅋ
    const _BURN = () => {
        const core = document.getElementById('RLNL_CORE');
        if(core) core.remove(); 
        document.getElementById('S_LOCK').style.display = 'flex';
        document.documentElement.innerHTML = ""; 
        window.location.replace("about:blank"); 
    };

    // 속도 감지 (F12 열면 브라우저 느려짐 감지 ㅋ)
    setInterval(() => {
        const t1 = new Date().getTime();
        for(let i=0; i<50; i++) { console.log(""); console.clear(); }
        if (new Date().getTime() - t1 > 50) _BURN();
    }, 500);

    // 단축키 차단
    window.onkeydown = (e) => {
        if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) _BURN();
    };

    // 로그 연출
    setInterval(()=>{
        const l=document.getElementById('L_LIST');
        const d=document.createElement('div');
        d.innerHTML=`[${new Date().toLocaleTimeString()}] User Access Success`;
        l.prepend(d); if(l.children.length>25)l.lastChild.remove();
    }, 2000);
})();
</script>
