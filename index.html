<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLDEN ELITE | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10, 15, 25, 0.98); --l: rgba(0, 255, 204, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; font-family: 'Noto Sans KR', sans-serif; }
        body { background: var(--b); color: #fff; min-height: 100vh; overflow-x: hidden; }

        /* [보안] 감지 시 즉시 실행될 차단 레이어 */
        #S_MASK { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; color: #ff0033; flex-direction: column; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; text-align: center; }

        .C { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .H { position: sticky; top: 0; z-index: 1000; background: rgba(2, 4, 8, 0.9); backdrop-filter: blur(20px); border-bottom: 2px solid var(--n); padding: 18px 0; display: flex; justify-content: space-between; align-items: center; }
        .L { font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        .L span { color: var(--n); text-shadow: 0 0 10px var(--n); }
        
        .GRID { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 40px 0; }
        .CARD { background: var(--p); border: 1px solid var(--l); border-radius: 15px; overflow: hidden; transition: 0.4s; text-align: center; padding-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .CARD:hover { transform: translateY(-10px); border-color: var(--n); box-shadow: 0 10px 30px rgba(0,255,204,0.2); }
        .IMG { width: 100%; height: 150px; background: #000; border-bottom: 1px solid var(--l); overflow: hidden; }
        .IMG img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .NAME { font-size: 17px; font-weight: 800; margin: 20px 0; letter-spacing: 1px; }
        .BTN { width: 85%; padding: 12px; background: transparent; border: 1px solid var(--n); color: var(--n); border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .BTN:hover { background: var(--n); color: #000; }

        @media (max-width: 1000px) { .GRID { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body oncontextmenu="return false">

<div id="S_MASK">
    <div>🛑 SECURITY ALERT 🛑</div>
    <p style="font-size: 14px; color: #555; margin-top: 20px; font-weight: 400;">비정상적인 소스 접근이 감지되어 데이터가 보호되었습니다.<br>개발자 도구를 끄고 다시 접속해 주세요.</p>
</div>

<div id="MAIN_UI">
    <header class="H C">
        <div class="L">GOLDEN<span>ELITE</span></div>
        <button onclick="alert('점검 중입니다.')" style="background:var(--n); border:none; padding:10px 25px; border-radius:8px; font-weight:900; cursor:pointer;">입장 / 회원가입</button>
    </header>

    <div class="C">
        <div class="GRID" id="b_list"></div>
    </div>
</div>

<script>
    /* 1. 배너 데이터 관리 (수정 가능) */
    const _D = [
        {n:"STAKE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=STAKE", u:"#"},
        {n:"ROOBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ROOBET", u:"#"},
        {n:"1XBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=1XBET", u:"#"},
        {n:"BC.GAME", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=BC.GAME", u:"#"},
        {n:"TITAN", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=TITAN", u:"#"},
        {n:"EMPIRE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=EMPIRE", u:"#"},
        {n:"SKYBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=SKYBET", u:"#"},
        {n:"ACEBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ACEBET", u:"#"}
    ];

    document.getElementById('b_list').innerHTML = _D.map(p => `
        <div class="CARD">
            <div class="IMG"><img src="${p.i}"></div>
            <div class="NAME">${p.n}</div>
            <button class="BTN" onclick="window.open('${p.u}')">사이트 입장</button>
        </div>
    `).join('');

    /* -----------------------------------------------------------
       🛡️ [철통 보안 엔진] 소스 보호 및 실시간 감시
    ----------------------------------------------------------- */
    (function(){
        const mask = document.getElementById('S_MASK');
        const ui = document.getElementById('MAIN_UI');
        
        // 소스 즉시 파기 함수
        const DESTROY = () => { 
            ui.remove(); // 1. 브라우저 메모리에서 HTML 소스를 아예 삭제
            mask.style.display = "flex"; // 2. 차단 화면 표시
            console.clear(); 
        };

        // A. 키보드 단축키 차단 (F12, Ctrl+U 등)
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); DESTROY();
            }
        });

        // B. 마우스 메뉴 진입(개발자 도구 실행) 실시간 감지
        setInterval(() => {
            // 브라우저 창과 실제 웹 표시 영역의 차이를 계산 (도구가 켜지면 차이가 커짐)
            const threshold = 160;
            const isDevToolsOpen = window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold;
            if (isDevToolsOpen) { DESTROY(); }
        }, 500);

        // C. 디버거 트랩 (분석 시도 시 코드 정지)
        setInterval(() => {
            const start = new Date().getTime();
            debugger; 
            if (new Date().getTime() - start > 100) { DESTROY(); }
        }, 500);

        window.oncontextmenu = () => false; // 우클릭 차단
    })();
</script>
</body>
</html>
