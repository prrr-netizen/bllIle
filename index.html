<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN ELITE | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10, 15, 25, 0.98); --l: rgba(0, 255, 204, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; font-family: 'Noto Sans KR', sans-serif; }
        body { background: var(--b); color: #fff; min-height: 100vh; }

        /* [보안] 평소엔 절대 안 보임 */
        #S_MASK { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; color: #ff0033; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; }

        .C { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .H { position: sticky; top: 0; z-index: 1000; background: rgba(2, 4, 8, 0.9); backdrop-filter: blur(20px); border-bottom: 2px solid var(--n); padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .L { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .L span { color: var(--n); }
        
        .GRID { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .CARD { background: var(--p); border: 1px solid var(--l); border-radius: 12px; overflow: hidden; transition: 0.3s; text-align: center; padding-bottom: 15px; }
        .CARD:hover { transform: translateY(-5px); border-color: var(--n); }
        .IMG { width: 100%; height: 130px; background: #111; border-bottom: 1px solid var(--l); overflow: hidden; }
        .IMG img { width: 100%; height: 100%; object-fit: cover; }
        .NAME { font-size: 15px; font-weight: 800; margin: 15px 0; }
        .BTN { width: 85%; padding: 10px; background: transparent; border: 1px solid var(--n); color: var(--n); border-radius: 6px; font-weight: 900; cursor: pointer; }
        .BTN:hover { background: var(--n); color: #000; }

        @media (max-width: 900px) { .GRID { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body oncontextmenu="return false">

<div id="S_MASK">
    <div>⚠️ 보안 위반 감지 (Security Access Denied) ⚠️</div>
    <p style="font-size: 14px; color: #444; margin-top: 15px;">비정상적인 접근 시도로 인해 소스 코드가 보호되었습니다.</p>
</div>

<div id="MAIN_UI">
    <header class="H C">
        <div class="L">GOLDEN<span>ELITE</span></div>
        <button style="background:var(--n); border:none; padding:8px 20px; border-radius:5px; font-weight:900; cursor:pointer;">입장 / 가입</button>
    </header>

    <div class="C">
        <div class="GRID" id="b_target"></div>
    </div>
</div>

<script>
    /* [배너 설정] 주소와 이름을 여기에 넣으세요 */
    const _D = [
        {n:"STAKE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=STAKE", u:"#"},
        {n:"ROOBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ROOBET", u:"#"},
        {n:"1XBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=1XBET", u:"#"},
        {n:"BC.GAME", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=BC.GAME", u:"#"},
        {n:"TITAN", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=TITAN", u:"#"},
        {n:"EMPIRE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=EMPIRE", u:"#"},
        {n:"SKYBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=SKYBET", u:"#"},
        {n:"ACEBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ACEBET", u:"#"}
    ];

    document.getElementById('b_target').innerHTML = _D.map(p => `
        <div class="CARD">
            <div class="IMG"><img src="${p.i}"></div>
            <div class="NAME">${p.n}</div>
            <button class="BTN" onclick="window.open('${p.u}')">사이트 입장</button>
        </div>
    `).join('');

    /* -----------------------------------------------------------
       🛡️ [실전 보정 보안] 정상 접속은 허용, 침입만 차단
    ----------------------------------------------------------- */
    (function(){
        const mask = document.getElementById('S_MASK');
        const ui = document.getElementById('MAIN_UI');
        
        // 소스 파괴 로직
        const DESTROY = () => { 
            ui.innerHTML = ""; // 메인 소스 즉시 삭제
            ui.style.display = "none";
            mask.style.display = "flex"; 
            console.clear(); 
        };

        // 1. 단축키 차단 (F12 등)
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); DESTROY();
            }
        });

        // 2. [수정됨] 마우스 우회 차단 감도 조절
        // 창 크기가 아주 작아도 작동하게 250px 이상의 급격한 변화만 감지
        setInterval(() => {
            const threshold = 250; 
            const isDevToolsOpen = window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold;
            if (isDevToolsOpen) { DESTROY(); }
        }, 1000);

        // 3. 디버거 감지 (도구를 켠 상태에서만 작동)
        setInterval(() => {
            const start = new Date().getTime();
            debugger;
            if (new Date().getTime() - start > 100) { DESTROY(); }
        }, 1000);

        window.oncontextmenu = () => false; // 우클릭 방지
    })();
</script>
</body>
</html>
