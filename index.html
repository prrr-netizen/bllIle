<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLDEN PARTNER | PREMIUM V4.1</title>
    <style>
        :root {
            --p-gold: #ffb400;
            --s-gold: #ff8c00;
            --bg: #05070f;
            --card: rgba(18, 22, 41, 0.7);
            --border: rgba(255, 180, 0, 0.2);
        }

        /* 초기화 및 보안 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, #1a1f3d 0%, var(--bg) 80%);
            font-family: 'Pretendard', sans-serif; color: #fff; line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }

        /* 상단 띠 배너 (방문자 수 추가) */
        .top-status { background: #000; border-bottom: 1px solid var(--border); padding: 8px 0; font-size: 11px; color: #888; font-weight: bold; }
        .top-status .flex { display: flex; justify-content: space-between; align-items: center; }
        .user-count { color: #00ff41; text-shadow: 0 0 5px #00ff41; }

        /* 헤더 */
        .header { position: sticky; top: 0; z-index: 9999; background: rgba(5, 7, 15, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px 0; }
        .h-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #fff, var(--p-gold)); -webkit-background-clip: text; color: transparent; }
        
        /* 메인 레이아웃 */
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 40px; margin: 40px auto; }

        /* 배너 그리드 */
        .banner-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); border-color: var(--p-gold); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .card-img { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .card-body { padding: 20px; }
        .btn-premium { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--p-gold), var(--s-gold)); color: #000; font-weight: 900; border-radius: 10px; cursor: pointer; border: none; }

        /* 사이드바 - 실시간 위젯 & 방문 기록 */
        .side-sticky { position: sticky; top: 100px; display: flex; flex-direction: column; gap: 20px; }
        .widget { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .widget-h { font-size: 14px; font-weight: 800; color: var(--p-gold); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; }
        
        /* 방문 기록 전용 스타일 (작고 세련되게) */
        #visit-log { height: 150px; overflow: hidden; position: relative; }
        .log-item { font-size: 11px; color: #666; padding: 5px 0; border-bottom: 1px dotted rgba(255,255,255,0.05); animation: logFade 0.5s ease; }
        .log-item b { color: #aaa; }

        @keyframes logFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } .banner-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false">

<div class="top-status">
    <div class="container flex">
        <div>SERVER: <span style="color:white">ONLINE</span> | <span class="user-count">●</span> CURRENT USERS: <b id="live-users" style="color:white">1,248</b></div>
        <div id="top-clock">00:00:00</div>
    </div>
</div>

<header class="header">
    <div class="container h-flex">
        <div class="logo">GOLDEN PARTNER</div>
        <nav style="font-size:13px; font-weight:bold; color:#888; display:flex; gap:20px;">
            <span style="color:var(--p-gold)">PARTNERS</span>
            <span onclick="alert('텔레그램: @GOLD_ADMIN')">문의하기</span>
        </nav>
    </div>
</header>

<main class="container">
    <div class="main-layout">
        <section id="banners">
            <h2 style="font-size: 24px; margin-bottom: 25px;">Verified Partners</h2>
            <div class="banner-grid" id="render-target"></div>
        </section>

        <aside class="side-sticky">
            <div class="widget">
                <div class="widget-h">LIVE STATUS <span style="font-size:10px; color:#555;">REALTIME</span></div>
                <div id="live-list" style="font-size:13px;"></div>
            </div>

            <div class="widget">
                <div class="widget-h">VISITOR LOG <span style="font-size:10px; color:#555;">SECURE</span></div>
                <div id="visit-log">
                    </div>
            </div>
        </aside>
    </div>
</main>

<script>
    const _PARTNERS = [
        { name: "다이아몬드 에셋", info: "자본력 대조 완료 / 3년 무사고 운영", icon: "💎", url: "#" },
        { name: "로얄 팰리스", info: "최상위 VVIP 보안 서버 운영 중", icon: "🏰", url: "#" },
        { name: "골든 뱅크", info: "실시간 자금 흐름 투명성 100% 보장", icon: "💰", url: "#" },
        { name: "타이탄 시큐리티", info: "DDoS 방어 및 암호화 적용", icon: "🛡️", url: "#" }
    ];

    const draw = () => {
        document.getElementById('render-target').innerHTML = _PARTNERS.map(p => `
            <div class="card">
                <div class="card-img">${p.icon}</div>
                <div class="card-body">
                    <h4 style="font-size:18px; margin-bottom:5px;">${p.name}</h4>
                    <p style="font-size:13px; color:#666; margin-bottom:15px;">${p.info}</p>
                    <button class="btn-premium" onclick="showGateway('${p.name}')">상세 정보 확인</button>
                </div>
            </div>
        `).join('');
    };

    const showGateway = (n) => {
        if(confirm(`[ ${n} ]\n공식 인증 파트너사입니다.\n상세 페이지로 이동하시겠습니까?`)) {
            alert("이동 중입니다...");
        }
    };

    // 실시간 활동 & 방문 기록 시뮬레이션
    const _IPS = ["1.214.***.***", "221.141.***.***", "118.33.***.***", "59.12.***.***", "175.202.***.***"];
    const _ACTIONS = ["메인 페이지 접속", "파트너 목록 조회", "상세 정보 클릭", "입점 문의 확인"];

    const addLog = () => {
        const logContainer = document.getElementById('visit-log');
        const item = document.createElement('div');
        item.className = 'log-item';
        
        const rIp = _IPS[Math.floor(Math.random() * _IPS.length)];
        const rAct = _ACTIONS[Math.floor(Math.random() * _ACTIONS.length)];
        const now = new Date();
        const timeStr = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;

        item.innerHTML = `[${timeStr}] <b>User(${rIp})</b> ${rAct}`;
        
        logContainer.prepend(item);
        if(logContainer.children.length > 8) logContainer.lastElementChild.remove();
    };

    // 실시간 유저 수 변동
    const updateUserCount = () => {
        const base = 1200;
        const rand = Math.floor(Math.random() * 50);
        document.getElementById('live-users').innerText = (base + rand).toLocaleString();
    };

    // 시계
    setInterval(() => {
        document.getElementById('top-clock').innerText = new Date().toTimeString().split(' ')[0];
    }, 1000);

    // 실행 엔진
    draw();
    setInterval(addLog, 3000); // 3초마다 방문 기록 업데이트
    setInterval(updateUserCount, 5000); // 5초마다 유저수 변동

    // 보안 강화
    window.addEventListener('keydown', (e) => {
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73)) {
            alert("PREMIUM SECURITY ACTIVE");
            e.preventDefault();
        }
    });
</script>

</body>
</html>
