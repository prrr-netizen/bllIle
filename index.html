<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>RLNL PLATFORM | SECURE</title>
    <style>
        :root { --n: #00ffcc; --b: #020408; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; -webkit-user-select:none; user-select:none; }
        body { background:var(--b); color:#fff; overflow:hidden; }

        /* 배너 레이아웃 (슬림 사이즈) */
        .CONTAINER { max-width: 1200px; margin: 20px auto; padding: 20px; display: grid; grid-template-columns: 1fr 250px; gap: 15px; }
        .GRID { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; }
        .CARD { background:#0a0f19; border:1px solid #1a2233; border-radius:4px; padding:10px; text-align:center; transition:0.2s; }
        .CARD:hover { border-color:var(--n); }
        .IMG { height:60px; background:#111; margin-bottom:8px; display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--n); font-size:12px; }
        .GO { display:block; padding:5px; border:1px solid var(--n); color:var(--n); text-decoration:none; font-size:10px; font-weight:bold; }

        /* 자폭 시 노출될 레이어 */
        #BLOCK_LAYER { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:99999; color:var(--n); flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="VIEW_ZONE">
        <div class="CONTAINER">
            <section class="GRID" id="B_LIST"></section>
            <aside style="border:1px solid #1a2233; padding:10px; font-size:10px; color:#444;">
                <div style="color:var(--n); margin-bottom:10px;">LIVE MONITORING</div>
                <div id="L_LIST"></div>
            </aside>
        </div>
    </div>

    <div id="BLOCK_LAYER">
        <h1 style="font-size:24px;">🛡️ SECURITY SYSTEM ACTIVE</h1>
        <p style="margin-top:10px; color:#666;">소스 코드 보호를 위해 콘텐츠를 숨겼습니다.</p>
    </div>

<script>
const NAMES = ['STAKE','ROOBET','1XBET','BC.GAME','TITAN','EMPIRE','ACEBET','SKYBET','KINGBET','STARBET'];

// 1. 배너 생성
document.getElementById('B_LIST').innerHTML = NAMES.map(v => `
    <div class="CARD">
        <div class="IMG">${v}</div>
        <a href="#" class="GO">ENTER</a>
    </div>
`).join('');

/* 🛡️ 운영자님의 핵심 요구사항: F12 & 점선 메뉴 차단 */
(function(){
    const HIDE = () => {
        document.getElementById('VIEW_ZONE').style.display = "none";
        document.getElementById('BLOCK_LAYER').style.display = "flex";
    };

    // [체크 1] F12 및 소스보기 단축키 (F12 = 123)
    window.addEventListener('keydown', (e) => {
        if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault();
            HIDE();
        }
    });

    // [체크 2] 점선 메뉴로 들어오는 '검사'창 감지 ㅋ
    // 소스 창이 열리면서 브라우저 가용 면적이 줄어드는 걸 0.1초마다 체크
    setInterval(() => {
        const diff = 160;
        if (window.outerWidth - window.innerWidth > diff || window.outerHeight - window.innerHeight > diff) {
            HIDE();
        }
    }, 100);

    // [체크 3] 무한 디버거 (분석 원천 봉쇄)
    setInterval(() => { (function(){return false}['constructor']('debugger')['call']()); }, 50);
})();

// 로그 연출
setInterval(()=>{
    const l = document.getElementById('L_LIST');
    const d = document.createElement('div');
    d.innerHTML = `[${new Date().toLocaleTimeString()}] Access Verified...`;
    l.prepend(d); if(l.children.length > 15) l.lastChild.remove();
}, 2500);
</script>
</body>
</html>
