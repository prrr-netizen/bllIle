        .L_LIST { height: 400px; overflow: hidden; font-size: 14px; color: #aaa; line-height: 2.8; }
        .L_ITEM { border-bottom: 1px dotted #222; }

        @media (max-width: 1200px) { .MAIN_SEC { grid-template-columns: 1fr; } .G_B { grid-template-columns: repeat(1, 1fr); } }
