<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLNL PLATFORM | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10,15,25,0.98); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; -webkit-user-select:none; user-select:none; }
        body { background:var(--b); color:#fff; min-height:100vh; overflow-x:hidden; }

        /* [1] 헤더 */
        header { width:100%; background:rgba(2,4,8,0.98); border-bottom:1px solid var(--n); padding:15px 40px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; }
        .LOGO { font-family:'Black Han Sans', sans-serif; font-size:26px; color:#fff; cursor:pointer; }
        .LOGO span { color:var(--n); }
        .SNS_BTNS { display:flex; gap:10px; }
        .SNS_BTNS a { text-decoration:none; padding:8px 18px; border-radius:5px; font-weight:900; font-size:12px; transition:0.3s; color:#000; }
        .KAKA { background:#FEE500; }
        .TELE { background:#0088cc; color:#fff; }
        .DISC { background:#5865F2; color:#fff; }

        /* [2] 메인 레이아웃 (중앙 정렬) */
        .MAIN_WRAP { max-width: 1450px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 300px; gap: 30px; }
        .BANNER_GRID { display:grid; grid-template-columns:repeat(5, 1fr); gap:15px; }
        .CARD { background:var(--p); border:1px solid #1a2233; border-radius:10px; overflow:hidden; text-align:center; padding-bottom:15px; transition:0.3s; }
        .CARD:hover { border-color:var(--n); transform:translateY(-8px); box-shadow:0 10px 20px rgba(0,255,204,0.15); }
        
        .IMG_BOX { width:100%; height:90px; background:#111; display:flex; align-items:center; justify-content:center; border-bottom:1px solid #1a2233; overflow:hidden; }
        .IMG_BOX img { width:85%; height:80%; object-fit:contain; opacity:0.8; transition:0.4s; }
        
        .NAME { font-size:15px; font-weight:900; margin:12px 0; color:#eee; }
        .ENTER_BTN { display:block; width:85%; margin:0 auto; padding:10px; border:1px solid var(--n); color:var(--n); border-radius:5px; font-weight:900; text-decoration:none; font-size:12px; transition:0.3s; }
        .ENTER_BTN:hover { background:var(--n); color:#000; }

        /* [3] 사이드바 로그 */
        .SIDEBAR { background:#0a0f19; border:1px solid #1a2233; border-radius:10px; padding:20px; height:500px; position:sticky; top:110px; }
        .LOG_TITLE { color:var(--n); font-weight:900; font-size:14px; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px; }
        .LOG_LIST { height:400px; overflow:hidden; font-size:12px; color:#555; line-height:2.4; }

        /* [4] 🛡️ 보안 화면 (도메인 유지) */
        #SECURITY_SHIELD { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999; flex-direction:column; align-items:center; justify-content:center; }
        #SECURITY_SHIELD h1 { color:var(--n); font-size:30px; font-family:'Black Han Sans'; margin-bottom:15px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="NORMAL_VIEW">
        <header>
            <div class="LOGO" onclick="location.reload()">RLNL<span>PLATFORM</span></div>
            <div class="SNS_BTNS">
                <a href="#" target="_blank" class="KAKA">KAKAOTALK</a>
                <a href="#" target="_blank" class="TELE">TELEGRAM</a>
                <a href="#" target="_blank" class="DISC">DISCORD</a>
            </div>
        </header>

        <div class="MAIN_WRAP">
            <section class="BANNER_GRID" id="BANNER_CONTAINER"></section>
            <aside class="SIDEBAR">
                <div class="LOG_TITLE">LIVE SERVER ACTIVITY</div>
                <div class="LOG_LIST" id="LOG_CONTAINER"></div>
            </aside>
        </div>
    </div>

    <div id="SECURITY_SHIELD">
        <h1>🛡️ SECURITY DETECTED</h1>
        <p style="color:#666;">소스 코드 분석 감지로 인해 화면을 보호합니다. (F5 새로고침)</p>
    </div>

<script>
/* 사장님, GIF 로고 주소랑 URL 주소 여기에 넣으시면 됩니다 ㅋ */
const B_DATA = [
    { name: 'STAKE',   logo: 'logo1.gif', url: '#' },
    { name: 'ROOBET',  logo: 'logo2.gif', url: '#' },
    { name: '1XBET',   logo: 'logo3.gif', url: '#' },
    { name: 'BC.GAME', logo: 'logo4.gif', url: '#' },
    { name: 'TITAN',   logo: 'logo5.gif', url: '#' },
    { name: 'EMPIRE',  logo: 'logo6.gif', url: '#' },
    { name: 'ACEBET',  logo: 'logo7.gif', url: '#' },
    { name: 'SKYBET',  logo: 'logo8.gif', url: '#' },
    { name: 'KINGBET', logo: 'logo9.gif', url: '#' },
    { name: 'STARBET', logo: 'logo10.gif', url: '#' }
];

(function INIT(){
    document.getElementById('BANNER_CONTAINER').innerHTML = B_DATA.map(item => `
        <div class="CARD">
            <div class="IMG_BOX"><img src="${item.logo}" onerror="this.src='https://via.placeholder.com/200x100/111/00ffcc?text=LOGOGIF'"></div>
            <div class="NAME">${item.name}</div>
            <a href="${item.url}" target="_blank" class="ENTER_BTN">ENTER SITE</a>
        </div>
    `).join('');
    
    START_LOGS();
    START_SECURITY();
})();

function START_SECURITY(){
    const BOOM = () => {
        document.getElementById('NORMAL_VIEW').style.display = "none";
        document.getElementById('SECURITY_SHIELD').style.display = "flex";
    };

    // F12 차단
    window.addEventListener('keydown', (e) => {
        if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault(); BOOM();
        }
    });

    // 점선 메뉴(개발자 도구 창) 감지 - 민감도 완화 (임계값 250으로 상향) ㅋ
    setInterval(() => {
        const threshold = 250; 
        if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
            BOOM();
        }
    }, 500); // 체크 주기를 0.5초로 늘려 부하 감소 ㅋ

    // 디버거 방해
    setInterval(() => { (function(){return false}['constructor']('debugger')['call']()); }, 100);
}

function START_LOGS(){
    setInterval(()=>{
        const container = document.getElementById('LOG_CONTAINER');
        const div = document.createElement('div');
        const id = Math.random().toString(36).substr(2, 5).toUpperCase();
        div.innerHTML = `<span style="color:var(--n)">[${new Date().toLocaleTimeString()}]</span> User_${id} Access Success`;
        container.prepend(div);
        if(container.children.length > 18) container.lastChild.remove();
    }, 2500);
}
</script>
</body>
</html>
