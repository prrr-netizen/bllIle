<!DOCTYPE html>
<html lang="ko">
<head>

    <title>RLNL PLATFORM | OFFICIAL AD NETWORK</title>
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10,15,25,0.98); --l: rgba(0,255,204,0.4); --r: #ff0033; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
        body { background:var(--b); color:#fff; min-height:100vh; overflow-x:hidden; }
        #S_LOCK { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999; flex-direction:column; align-items:center; justify-content:center; color:var(--r); font-weight:900; font-size:22px; text-shadow:0 0 10px var(--r); }
        .C { max-width:1400px; margin:0 auto; padding:0 20px; }
        .H { position:sticky; top:0; z-index:1000; background:rgba(2,4,8,0.95); backdrop-filter:blur(15px); border-bottom:2px solid var(--n); padding:15px 0; display:flex; justify-content:space-between; align-items:center; }
        .L { font-size:30px; font-weight:900; letter-spacing:-1px; cursor:pointer; }
        .L span { color:var(--n); text-shadow:0 0 10px var(--n); }
        .BTNS a { text-decoration:none; color:#000; background:var(--n); padding:12px 22px; border-radius:6px; font-weight:900; margin-left:10px; font-size:14px; transition:0.3s; }
        .BTNS a:hover { background:#fff; transform:scale(1.05); }
        .MAIN_SET { display:grid; grid-template-columns: 1fr 340px; gap:30px; margin:40px 0; }
        .G_Z { display:grid; grid-template-columns:repeat(2, 1fr); gap:15px; }
        .CARD { background:var(--p); border:1px solid var(--l); border-radius:12px; overflow:hidden; transition:0.3s; text-align:center; padding-bottom:15px; position:relative; }
        .CARD:hover { border-color:var(--n); transform:translateY(-5px); }
        .I_Z { width:100%; height:150px; background:#111; position:relative; }
        .I_Z img { width:100%; height:100%; object-fit:cover; opacity:0.6; }
        .BADGE { position:absolute; top:10px; left:10px; background:var(--r); color:#fff; font-size:10px; padding:3px 8px; border-radius:3px; font-weight:900; }
        .NAME { font-size:17px; font-weight:900; margin:15px 0; color:var(--n); }
        .GO { display:block; width:85%; margin:0 auto; padding:12px; border:1px solid var(--n); color:var(--n); border-radius:6px; font-weight:900; text-decoration:none; transition:0.3s; }
        .GO:hover { background:var(--n); color:#000; }
        .SIDE { background:#0a0f19; border:1px solid #1a2233; border-radius:12px; padding:20px; }
        .LOGS { height:450px; overflow:hidden; font-size:13px; color:#888; line-height:2.4; border-top:1px solid #1a2233; margin-top:15px; padding-top:10px; }
        @media (max-width:1000px) { .MAIN_SET { grid-template-columns:1fr; } }
    </style>
</head>
