<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLDEN ELITE | OFFICIAL NETWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10, 15, 25, 0.98); --l: rgba(0, 255, 204, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; font-family: 'Noto Sans KR', sans-serif; }
        body { background: var(--b); color: #fff; overflow-x: hidden; min-height: 100vh; }

        /* [보안] 감지 시 나타날 가짜 레이어 */
        #S_MASK { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; color: #ff0033; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; }

        .C { max-width: 1300px; margin: 0 auto; padding: 0 25px; }
        .H { position: sticky; top: 0; z-index: 1000; background: rgba(2, 4, 8, 0.9); backdrop-filter: blur(20px); border-bottom: 2px solid var(--n); padding: 18px 0; display: flex; justify-content: space-between; align-items: center; }
        .L { font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        .L span { color: var(--n); text-shadow: 0 0 10px var(--n); }
        
        .GRID { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 40px 0; }
        .CARD { background: var(--p); border: 1px solid var(--l); border-radius: 15px; overflow: hidden; transition: 0.4s; text-align: center; padding-bottom: 20px; }
        .CARD:hover { transform: translateY(-10px); border-color: var(--n); box-shadow: 0 10px 30px rgba(0,255,204,0.2); }
        .IMG { width: 100%; height: 140px; background: #000; border-bottom: 1px solid var(--l); }
        .IMG img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .CARD:hover .IMG img { opacity: 1; transform: scale(1.05); }
        .NAME { font-size: 16px; font-weight: 800; margin: 18px 0; }
        .BTN { width: 85%; padding: 12px; background: transparent; border: 1px solid var(--n); color: var(--n); border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .BTN:hover { background: var(--n); color: #000; }

        /* 모달 디자인 */
        .MODAL { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10001; align-items: center; justify-content: center; }
        .M_BOX { background: #0b1019; width: 380px; padding: 45px; border-radius: 25px; border: 1px solid var(--n); text-align: center; }
        .IN { width: 100%; padding: 15px; background: #05070a; border: 1px solid #222; border-radius: 10px; color: #fff; margin-bottom: 15px; outline: none; }
        .CAP { background: #1e2633; color: var(--n); font-size: 24px; font-weight: 900; border-radius: 10px; padding: 15px; margin-bottom: 20px; letter-spacing: 10px; }

        @media (max-width: 1000px) { .GRID { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body oncontextmenu="return false">

<div id="S_MASK">
    <div>🛑 SECURITY BREACH DETECTED 🛑</div>
    <div style="font-size: 14px; color: #555; margin-top: 20px; font-weight: 400;">비정상적인 접근이 감지되어 소스코드를 즉시 파기했습니다.<br>도구를 끄고 다시 접속하세요.</div>
</div>

<div id="MAIN_UI">
    <header class="H C">
        <div class="L">GOLDEN<span>ELITE</span></div>
        <div id="u_zone">
            <button onclick="o_m()" style="background:var(--n); border:none; padding:10px 25px; border-radius:8px; font-weight:900; cursor:pointer;">로그인 / 가입</button>
        </div>
    </header>

    <div class="C">
        <div class="GRID" id="b_list"></div>
    </div>
</div>

<div class="MODAL" id="m_win">
    <div class="M_BOX">
        <h2 style="margin-bottom:25px;">MEMBER ACCESS</h2>
        <input type="text" id="m_id" class="IN" placeholder="아이디" autocomplete="off">
        <div class="CAP" id="c_display">0000</div>
        <input type="text" id="c_val" class="IN" placeholder="인증번호 입력" maxlength="4">
        <button onclick="h_auth()" style="width:100%; padding:16px; background:var(--n); border:none; border-radius:10px; font-weight:900; cursor:pointer;">입장하기</button>
        <p onclick="c_m()" style="margin-top:20px; color:#333; cursor:pointer; font-size:12px;">닫기</p>
    </div>
</div>

<script>
    /* [1. 배너 데이터 관리] n:이름, i:이미지주소, u:링크주소 */
    const _D = [
        {n:"STAKE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=STAKE", u:"#"},
        {n:"ROOBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ROOBET", u:"#"},
        {n:"1XBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=1XBET", u:"#"},
        {n:"BC.GAME", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=BC.GAME", u:"#"},
        {n:"TITAN", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=TITAN", u:"#"},
        {n:"EMPIRE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=EMPIRE", u:"#"},
        {n:"SKYBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=SKYBET", u:"#"},
        {n:"ACEBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ACEBET", u:"#"}
    ];

    document.getElementById('b_list').innerHTML = _D.map(p => `
        <div class="CARD">
            <div class="IMG"><img src="${p.i}"></div>
            <div class="NAME">${p.n}</div>
            <button class="BTN" onclick="window.open('${p.u}')">사이트 입장</button>
        </div>
    `).join('');

    /* [2. 로그인/가입 로직] */
    let _CV = "";
    const o_m = () => { document.getElementById('m_win').style.display='flex'; _CV=Math.floor(1000+Math.random()*9000); document.getElementById('c_display').innerText=_CV; };
    const c_m = () => document.getElementById('m_win').style.display='none';
    const h_auth = () => {
        const id = document.getElementById('m_id').value;
        if(document.getElementById('c_val').value == _CV && id) {
            alert(id + "님, 보안 인증 성공!");
            document.getElementById('u_zone').innerHTML = `<span style="color:var(--n); font-weight:900;">WELCOME, ${id}</span>`;
            c_m();
        } else { alert("인증 정보가 올바르지 않습니다."); o_m(); }
    };

    /* -----------------------------------------------------------
       🛡️ [실전 최종 보안] 마우스 메뉴 진입 시 소스 파괴 엔진
    ----------------------------------------------------------- */
    (function(){
        const mask = document.getElementById('S_MASK');
        const ui = document.getElementById('MAIN_UI');
        
        // [핵심] 소스 파괴 함수: 호출되면 메모리에서 HTML 자체를 삭제함
        const DESTROY = () => { 
            ui.remove(); // 메인 UI 구역 삭제 (해커가 소스창을 열면 텅 비어있음)
            mask.style.display = "flex"; 
            console.clear(); 
        };

        // 1. 단축키 차단 (16진수 난독화)
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 0x7B || (e.ctrlKey && e.shiftKey && (e.keyCode === 0x49 || e.keyCode === 0x4A)) || (e.ctrlKey && e.keyCode === 0x55)) {
                e.preventDefault(); DESTROY();
            }
        });

        // 2. 마우스 우회 차단 (우측 상단 메뉴로 도구 열 때 창 크기 변화 감지)
        setInterval(() => {
            const diffW = window.outerWidth - window.innerWidth > 160;
            const diffH = window.outerHeight - window.innerHeight > 160;
            if (diffW || diffH) { DESTROY(); }
        }, 400);

        // 3. 디버거 방해 (코드 분석 시도 시 멈춤)
        setInterval(() => {
            const t = new Date().getTime();
            debugger;
            if(new Date().getTime() - t > 100) { DESTROY(); }
        }, 300);

        window.oncontextmenu = () => false; // 우클릭 방지
    })();
</script>
</body>
</html>
