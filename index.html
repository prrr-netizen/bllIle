<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공식 검증 리스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans KR", sans-serif;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at top,#17172a 0,#05050a 55%,#020308 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 상단 바 */
        ._top_bar {
            background: rgba(0,0,0,0.95);
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-bottom: 1px solid #1a1a25;
            position: relative;
            z-index: 30;
        }
        ._top_btn {
            text-decoration: none;
            font-size: 13px;
            font-weight: 800;
            padding: 8px 20px;
            border-radius: 999px;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        /* 디스코드 버튼: 그라디언트 + 슬라이드 */
        ._btn_disc {
            color:#fff;
            background: linear-gradient(120deg,#5865F2,#00C9FF,#92FE9D);
            background-size: 200% 200%;
            animation: discIdle 6s ease infinite;
        }
        ._btn_disc::before{
            content:'';
            position:absolute;
            inset:0;
            background:linear-gradient(120deg,#7b8bff,#00d4ff,#9dffb3);
            background-size:200% 200%;
            opacity:0;
            transition:opacity .25s ease;
        }
        ._btn_disc span{
            position:relative;
            z-index:1;
        }
        ._btn_inq { 
            background: #f0b400; 
            color: #000; 
        }
        ._top_btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 22px rgba(0,0,0,0.5);
        }
        ._btn_disc:hover{
            animation:none;
        }
        ._btn_disc:hover::before{
            opacity:1;
        }
        ._btn_inq:hover{
            background:#ffe27a;
        }

        /* 헤더 */
        header {
            position: sticky;
            top: 0;
            background: linear-gradient(90deg,rgba(8,8,18,0.97),rgba(9,9,26,0.97));
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 180, 0, 0.25);
            z-index:20;
        }
        ._hi {
            max-width: 1400px;
            margin: auto;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        ._logo {
            font-size: 24px;
            font-weight: 900;
            color: #f0b400;
            text-decoration: none;
            letter-spacing: .12em;
        }
        ._oc_box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 15px;
            border-radius: 99px;
            font-size: 13px;
        }
        ._oc_dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow:0 0 10px #4ade80;
            animation: blink 1.5s infinite;
        }

        /* 공지 마퀴 */
        ._notice_w {
            background: radial-gradient(circle at left,#43340e 0,transparent 60%);
            padding: 10px 0;
            overflow: hidden;
            border-bottom:1px solid rgba(240,180,0,0.3);
        }
        ._notice_t {
            display: flex;
            gap: 80px;
            animation: marquee 35s linear infinite;
            white-space: nowrap;
        }
        ._notice_t span {
            font-size: 13px;
            color: rgba(255, 200, 100, 0.9);
            font-weight: 600;
        }

        /* 메인 래퍼 */
        ._main_wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px 60px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
        }

        /* 카드 */
        .ITEM_CARD {
            background: rgba(13,13,25,0.98);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            position:relative;
            overflow:hidden;
            transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .2s ease;
        }
        .ITEM_CARD::before{
            content:'';
            position:absolute;
            inset:-1px;
            background:linear-gradient(120deg,transparent,rgba(240,180,0,0.45),transparent);
            opacity:0;
            transition:opacity .25s ease;
            pointer-events:none;
        }
        .ITEM_CARD:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 30px rgba(0,0,0,0.7);
            border-color:rgba(240,180,0,0.55);
            background:rgba(18,18,35,0.98);
        }
        .ITEM_CARD:hover::before{
            opacity:1;
        }
        ._item_rank {
            width: 80px;
            font-size: 32px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        ._item_img {
            width: 100px;
            height: auto;
            margin-right: 15px;
            border-radius: 12px;
            overflow:hidden;
            flex-shrink:0;
        }
        ._item_img img {
            width: 100%;
            height: auto;
            display:block;
        }
        ._item_info {
            flex: 1;
            padding: 0 15px;
        }
        ._item_name {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        ._enter_btn {
            background: #f0b400;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 10px;
            transition: background 0.25s ease, transform 0.15s ease, box-shadow 0.15s ease;
            font-size:13px;
            white-space:nowrap;
        }
        ._enter_btn:hover {
            background: #ffe27a;
            transform:translateY(-1px);
            box-shadow:0 6px 18px rgba(0,0,0,0.55);
        }

        /* 사이드바 */
        ._sidebar {
            background: rgba(6,6,14,0.96);
            border: 1px solid #222;
            border-radius: 15px;
            padding: 20px;
            height: 600px;
            position: sticky;
            top: 90px;
            box-shadow:0 10px 35px rgba(0,0,0,0.7);
            font-size:11px;
        }
        #_log_container{
            max-height:540px;
            overflow-y:auto;
        }

        /* 관리자 패널 */
        #_admin_panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: #111;
            border: 2px solid #f0b400;
            padding: 30px;
            z-index: 2000;
            border-radius: 20px;
            box-shadow: 0 0 50px #000;
        }
        .admin_input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            font-size:13px;
        }
        .admin_submit {
            width: 100%;
            padding: 15px;
            background: #f0b400;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .admin_submit:hover {
            background: #e0a800;
        }

        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes discIdle{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        @media(max-width: 960px) {
            ._main_wrapper {
                grid-template-columns: 1fr;
            }
            ._sidebar {
                position: static;
                height: auto;
                margin-top:10px;
            }
            .ITEM_CARD {
                flex-direction: column;
                align-items: flex-start;
            }
            ._item_rank {
                width: auto;
                text-align: left;
                margin-bottom:4px;
            }
            ._item_img {
                width: 100%;
                height: auto;
                margin-bottom: 10px;
            }
            ._enter_btn {
                width: auto;
                margin: 10px 0 0 auto;
            }
        }
    </style>
</head>
<body>
<div class="_top_bar">
    <a href="#" class="_top_btn _btn_disc"><span>디스코드 채널</span></a>
    <a href="#" class="_top_btn _btn_inq">입점 문의</a>
</div>

<header>
    <div class="_hi">
        <a href="#" class="_logo">AD MASTER</a>
        <div class="_oc_box">
            <span class="_oc_dot"></span>
            현재 접속 <b id="_v_count">182</b>명
        </div>
    </div>
</header>

<div class="_notice_w">
    <div class="_notice_t" id="_notice_list"></div>
</div>

<div class="_main_wrapper">
    <main id="_item_list"></main>
    <aside>
        <div class="_sidebar">
            <div style="color: #f0b400; font-size: 13px; margin-bottom: 14px; font-weight:700;">실시간 로그</div>
            <div id="_log_container"></div>
        </div>
    </aside>
</div>

<div id="_admin_panel">
    <h2 style="text-align: center; margin-bottom: 20px;">관리자 모드</h2>
    <input type="text" id="_n" class="admin_input" placeholder="업체명" required>
    <input type="text" id="_i" class="admin_input" placeholder="이미지 URL" required>
    <input type="text" id="_u" class="admin_input" placeholder="이동 링크" required>
    <button class="admin_submit" onclick="_addItem()">등록하기</button>
    <button onclick="_closeAdmin()" style="width: 100%; margin-top: 10px; background: none; color: #555; border: none; cursor: pointer;">닫기</button>
    <div id="_adm_list" style="margin-top: 20px; max-height: 150px; overflow-y: auto;"></div>
</div>

<script>
let _DB = JSON.parse(localStorage.getItem('_AD_DATA_') || '[]');

window.onload = () => {
    _render();
    _initNotice();
    document.getElementById('_v_count').innerText = Math.floor(Math.random() * 40) + 182;
};

document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
});

function _s() {
    return '88593dsgwe2#$';
}

document.addEventListener('keydown', (e) => {
    const k = e.keyCode;

    if (k === 123) {
        e.preventDefault();
    }

    if (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(k)) {
        e.preventDefault();
    }

    if (e.ctrlKey && k === 85) {
        e.preventDefault();
    }

    if (e.ctrlKey && e.shiftKey && k === 89) {
        const p = prompt('관리자 비밀번호');
        const real = _s();
        if (p === real) {
            document.getElementById('_admin_panel').style.display = 'block';
            _renderA();
        } else if (p !== null) {
            alert('비밀번호가 올바르지 않습니다.');
        }
    }
});

// DevTools 열면 about:blank로 튕김
(function(){
    const t = 220;
    function c() {
        const w = window.outerWidth - window.innerWidth;
        const h = window.outerHeight - window.innerHeight;
        if (w > t || h > t) {
            location.href = 'about:blank';
        }
    }
    window.addEventListener('resize', c);
    window.addEventListener('load', c);
    window.addEventListener('focus', c);
})();

function _render() {
    const list = document.getElementById('_item_list');
    if (!_DB.length) {
        list.innerHTML = '<div style="text-align:center; padding:100px; color:#555;">등록된 업체가 없습니다.</div>';
        return;
    }
    list.innerHTML = _DB.map((i, idx) => `
        <div class="ITEM_CARD">
            <div class="_item_rank">${idx + 1}</div>
            <div class="_item_img">
                <img src="${i.img}" onerror="this.src='https://via.placeholder.com/100';" alt="${i.name} 이미지">
            </div>
            <div class="_item_info">
                <div class="_item_name">${i.name}</div>
                <div style="color:#4ade80; font-size: 11px;">검증완료</div>
            </div>
            <a href="${i.url}" target="_blank" class="_enter_btn">입장하기</a>
        </div>
    `).join('');
}

function _addItem() {
    const n = document.getElementById('_n').value.trim();
    const i = document.getElementById('_i').value.trim();
    const u = document.getElementById('_u').value.trim();
    if (!n || !i || !u) return;

    _DB.push({ name: n, img: i, url: u });
    localStorage.setItem('_AD_DATA_', JSON.stringify(_DB));
    _log('[+] ' + n + ' 등록');
    _render();
    _renderA();

    document.getElementById('_n').value = '';
    document.getElementById('_i').value = '';
    document.getElementById('_u').value = '';
}

function _renderA() {
    document.getElementById('_adm_list').innerHTML = _DB.map((i, idx) => `
        <div style="display: flex; justify-content: space-between; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 5px;">
            <span>${i.name}</span>
            <span onclick="_del(${idx})" style="color: #ff4d4d; cursor: pointer;">삭제</span>
        </div>
    `).join('');
}

function _del(idx) {
    const n = _DB[idx].name;
    _DB.splice(idx, 1);
    localStorage.setItem('_AD_DATA_', JSON.stringify(_DB));
    _log('[-] ' + n + ' 삭제');
    _render();
    _renderA();
}

function _log(msg) {
    const c = document.getElementById('_log_container');
    const d = document.createElement('div');
    d.style.cssText = "font-size: 11px; padding: 5px; border-left: 2px solid #f0b400; margin-bottom: 5px; background: rgba(255, 255, 255, 0.02);";
    d.innerHTML = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    c.prepend(d);
}

function _initNotice() {
    const m = ['실시간 모니터링 중', '사칭 사이트 주의', '입점 문의는 상단 확인'];
    document.getElementById('_notice_list').innerHTML =
        m.concat(m).map(t => `<span>● ${t}</span>`).join('');
}

function _closeAdmin() {
    document.getElementById('_admin_panel').style.display = 'none';
}
</script>
</body>
</html>
