<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLDEN ELITE | PREMIUM NETWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #020408; --panel: rgba(10, 15, 25, 0.98); --border: rgba(0, 255, 204, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; background-image: radial-gradient(circle at 50% -20%, #1a2a2a 0%, var(--bg) 85%); }
        
        /* 보안 차단 레이어 */
        #S_O { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; color: #ff0033; flex-direction: column; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; text-shadow: 0 0 10px #ff0033; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }
        
        /* 사이버펑크 헤더 */
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(2, 4, 8, 0.9); backdrop-filter: blur(25px); border-bottom: 2px solid var(--neon); padding: 18px 0; box-shadow: 0 5px 30px rgba(0,255,204,0.1); }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        .logo span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        
        /* 메인 레이아웃 */
        .main-content { display: grid; grid-template-columns: 1fr 320px; gap: 40px; margin: 50px auto; }
        .banner-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        
        /* 해외형 카드 디자인 */
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-12px); border-color: var(--neon); box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(0,255,204,0.2); }
        .card-img { width: 100%; height: 150px; background: #000; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); }
        .card-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .card:hover .card-img img { opacity: 1; transform: scale(1.1); }
        .card-body { padding: 22px; text-align: center; }
        .card-name { font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 18px; letter-spacing: 1px; }
        .btn-go { width: 100%; padding: 13px; background: transparent; border: 1px solid var(--neon); color: var(--neon); border-radius: 8px; font-weight: 900; font-size: 13px; transition: 0.3s; text-transform: uppercase; }
        .btn-go:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        /* 사이드바 위젯 */
        .widget { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .widget-title { font-size: 13px; font-weight: 900; color: var(--neon); text-transform: uppercase; margin-bottom: 20px; border-left: 3px solid var(--neon); padding-left: 12px; }
        .stat-val { font-size: 32px; font-weight: 900; color: #fff; margin-bottom: 5px; }

        /* 실전 로그인 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 99999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #0b0f1a; width: 420px; padding: 50px; border-radius: 30px; border: 1px solid var(--neon); box-shadow: 0 0 50px rgba(0,255,204,0.15); text-align: center; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-h { font-size: 26px; font-weight: 900; margin-bottom: 35px; color: #fff; letter-spacing: 1px; }
        .input-f { width: 100%; padding: 18px; background: #05070a; border: 1px solid #1e2633; border-radius: 12px; color: #fff; margin-bottom: 15px; font-size: 15px; outline: none; }
        .input-f:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        .cap-row { display: flex; gap: 12px; margin-bottom: 30px; }
        .cap-view { flex: 1; background: #1e2633; color: var(--neon); font-size: 24px; font-weight: 900; border-radius: 12px; display: flex; align-items: center; justify-content: center; letter-spacing: 8px; font-style: italic; }
        .btn-submit { width: 100%; padding: 20px; background: var(--neon); border: none; color: #000; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { filter: brightness(1.2); transform: translateY(-2px); }

        @media (max-width: 1200px) { .banner-grid { grid-template-columns: repeat(2, 1fr); } .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false">

<div id="S_O">
    <div>⚠️ SECURITY BREACH DETECTED ⚠️</div>
    <div style="font-size: 15px; color: #666; margin-top: 20px; font-weight: 400;">비정상적인 접근 감지로 인해 모든 데이터가 보호 모드로 전환되었습니다.<br>페이지를 새로고침하십시오.</div>
</div>

<div id="A_W">
    <header class="header">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="logo" onclick="location.reload()">GOLDEN<span>ELITE</span></div>
            <div id="user-status" style="display:flex; gap:15px; align-items:center;">
                <button onclick="o_m()" style="background:transparent; border:none; color:#fff; font-weight:700; cursor:pointer; font-size:14px;">로그인</button>
                <button onclick="o_m()" style="background:var(--neon); border:none; color:#000; padding:10px 22px; border-radius:6px; font-weight:900; cursor:pointer; font-size:14px;">회원가입</button>
            </div>
        </div>
    </header>

    <main class="container main-content">
        <section>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h3 style="font-size:14px; font-weight:900; color:#444; text-transform:uppercase; letter-spacing:2px;">Elite Partner Network</h3>
            </div>
            <div class="banner-grid" id="b-list"></div>
        </section>

        <aside>
            <div class="widget">
                <div class="widget-title">Live Server Status</div>
                <div class="stat-val" id="u-count">2,415</div>
                <div style="font-size:12px; color:#555;">실시간 온라인 유저</div>
            </div>
            <div class="widget">
                <div class="widget-title">Security Protocol</div>
                <p style="font-size:12px; color:#666; line-height:1.8;">Hyper-V3 실시간 감시 엔진 가동 중<br>모든 IP 및 접속 로그 암호화 저장</p>
            </div>
        </aside>
    </main>
</div>

<div class="modal" id="authModal">
    <div class="modal-box">
        <div class="modal-h">MEMBER ACCESS</div>
        <input type="text" id="u_id" class="input-f" placeholder="아이디" autocomplete="off">
        <input type="password" id="u_pw" class="input-f" placeholder="비밀번호" autocomplete="off">
        <div class="cap-row">
            <div class="cap-view" id="cap_code">----</div>
            <input type="text" id="cap_in" class="input-f" style="margin:0; width:140px; text-align:center;" placeholder="인증코드" maxlength="4">
        </div>
        <button class="btn-submit" onclick="h_a()">인증 및 로그인</button>
        <p onclick="c_m()" style="margin-top:25px; color:#444; font-size:12px; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">Close Window</p>
    </div>
</div>

<script>
    /* [데이터 설정] 이미지 주소와 이동할 URL을 입력하세요 */
    const _D = [
        {n:"STAKE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=STAKE+LOGO", u:"#"},
        {n:"ROOBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ROOBET+LOGO", u:"#"},
        {n:"1XBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=1XBET+LOGO", u:"#"},
        {n:"BC.GAME", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=BC.GAME+LOGO", u:"#"},
        {n:"TITAN", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=TITAN+LOGO", u:"#"},
        {n:"EMPIRE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=EMPIRE+LOGO", u:"#"},
        {n:"SKYBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=SKYBET+LOGO", u:"#"},
        {n:"ACEBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ACEBET+LOGO", u:"#"}
    ];

    /* [렌더링 루틴] */
    const render = () => {
        document.getElementById('b-list').innerHTML = _D.map(p => `
            <div class="card">
                <div class="card-img"><img src="${p.i}"></div>
                <div class="card-body">
                    <div class="card-name">${p.n}</div>
                    <button class="btn-go" onclick="window.open('${p.u}', '_blank')">사이트 입장</button>
                </div>
            </div>
        `).join('');
    };
    render();

    /* [회원 인증 시스템] */
    let _C = "";
    const o_m = () => {
        document.getElementById('authModal').style.display = 'flex';
        _C = Math.floor(1000 + Math.random()*9000);
        document.getElementById('cap_code').innerText = _C;
    };
    const c_m = () => document.getElementById('authModal').style.display = 'none';

    const h_a = () => {
        const id = document.getElementById('u_id').value;
        const cap = document.getElementById('cap_in').value;
        if(!id) { alert("아이디를 입력해주세요."); return; }
        if(cap != _C) { alert("인증코드가 일치하지 않습니다."); o_m(); return; }

        alert("✅ 보안 인증이 완료되었습니다.\n환영합니다, " + id + "님.");
        c_m();
        document.getElementById('user-status').innerHTML = `<span style="color:var(--neon); font-weight:900;">WELCOME, ${id}님</span> <span style="color:#333">|</span> <span onclick="location.reload()" style="cursor:pointer; font-size:12px; color:#666;">로그아웃</span>`;
    };

    /* [실전 보안 엔진 - 난독화 및 실시간 감시] */
    (function(){
        const s_o = document.getElementById('S_O');
        const a_w = document.getElementById('A_W');
        
        // 소스 파괴 함수
        function _X() { a_w.remove(); s_o.style.display = "flex"; console.clear(); }

        // 1. 단축키 차단 (F12, Ctrl+U 등)
        window.addEventListener('keydown', (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault(); _X();
            }
        });

        // 2. 마우스 우회 진입 감지 (창 크기 변화 실시간 모니터링)
        setInterval(() => {
            if(window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) { _X(); }
        }, 500);

        // 3. 디버거 루프 (뜯기 시도 시 실행 멈춤)
        setInterval(() => {
            const t1 = new Date().getTime();
            debugger;
            if(new Date().getTime() - t1 > 100) { _X(); }
        }, 200);

        // 실시간 인원 수 업데이트
        setInterval(() => {
            document.getElementById('u-count').innerText = (2400 + Math.floor(Math.random()*100)).toLocaleString();
        }, 3000);
    })();
</script>
</body>
</html>
