<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RLNL PLATFORM | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10,15,25,0.98); --l: rgba(0,255,204,0.4); --r: #ff0033; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; font-family:'Noto Sans KR', sans-serif; }
        body { background:var(--b); color:#fff; min-height:100vh; overflow-x:hidden; }

        /* 🛡️ 보안 잠금 화면 (사장님 스타일) */
        #S_LOCK { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999; flex-direction:column; align-items:center; justify-content:center; color:var(--r); font-weight:900; font-size:22px; text-shadow:0 0 10px var(--r); }
        
        .C { max-width:1600px; margin:0 auto; padding:0 20px; }
        .H { position:sticky; top:0; z-index:1000; background:rgba(2,4,8,0.95); backdrop-filter:blur(15px); border-bottom:2px solid var(--n); padding:15px 40px; display:flex; justify-content:space-between; align-items:center; }
        .L { font-family:'Black Han Sans', sans-serif; font-size:30px; cursor:pointer; }
        .L span { color:var(--n); text-shadow:0 0 10px var(--n); }
        
        /* 💎 메인 레이아웃 (배너 존) */
        .MAIN_SET { display:grid; grid-template-columns: 1fr 340px; gap:30px; margin:40px auto; }
        .G_Z { display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; } /* 2열로 토토 배너 느낌 ㅋ */
        
        /* 💎 토토 스타일 배너 카드 💎 */
        .CARD { background:var(--p); border:1px solid var(--l); border-radius:10px; overflow:hidden; transition:0.3s; position:relative; display:flex; flex-direction:column; }
        .CARD:hover { border-color:var(--n); transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,255,204,0.2); }
        
        .B_NAME { background: rgba(0,255,204,0.1); color: var(--n); padding: 10px; text-align: center; font-weight: 900; font-size: 18px; border-bottom: 1px solid #1a2233; }
        
        .I_Z { width:100%; height:160px; background:#111; overflow:hidden; position:relative; }
        .I_Z img { width:100%; height:100%; object-fit:cover; opacity:0.8; transition:0.4s; }
        .CARD:hover .I_Z img { opacity:1; transform:scale(1.05); }
        
        .GO { display:block; width:90%; margin:15px auto; padding:12px; background:transparent; border:2px solid var(--n); color:var(--n); text-align:center; text-decoration:none; font-size:15px; font-weight:900; border-radius:6px; transition:0.3s; }
        .GO:hover { background:var(--n); color:#000; box-shadow:0 0 15px var(--n); }

        .SIDE { background:#0a0f19; border:1px solid #1a2233; border-radius:12px; padding:25px; height:600px; }
        .LOGS { height:500px; overflow:hidden; font-size:13px; color:#555; line-height:2.6; border-top:1px solid #1a2233; margin-top:15px; padding-top:10px; }
        
        @media (max-width:1000px) { .G_Z { grid-template-columns:1fr; } .MAIN_SET { grid-template-columns:1fr; } }
    </style>
</head>
<body oncontextmenu="return false">

<div id="S_LOCK">🛑 SECURITY BREACH: SOURCE PURGED</div>

<div id="RLNL_CORE">
    <header class="H">
        <div class="L" onclick="location.reload()">RLNL<span>PLATFORM</span></div>
        <div style="display:flex; gap:10px;">
            <a href="#" style="text-decoration:none; color:#000; background:var(--n); padding:10px 20px; border-radius:5px; font-weight:900;">텔레그램 문의</a>
        </div>
    </header>

    <main class="C MAIN_SET">
        <section class="G_Z" id="B_LIST"></section>
        <aside class="SIDE">
            <div style="font-weight:900; color:var(--n); font-size:16px;">LIVE TRANSACTION LOG</div>
            <div class="LOGS" id="L_LIST"></div>
        </aside>
    </main>
</div>

<script>
/**
 * ★ 사장님 최종 수정 포인트 ★
 */
const IMG_URL = '49dc19377b18f04e82bbb033c5589799.png';
const B_DATA = [
    { n: "배너이름01", u: "https://주소1.com" },
    { n: "배너이름02", u: "https://주소2.com" },
    { n: "배너이름03", u: "https://주소3.com" },
    { n: "배너이름04", u: "https://주소4.com" },
    { n: "배너이름05", u: "https://주소5.com" },
    { n: "배너이름06", u: "https://주소6.com" },
    { n: "배너이름07", u: "https://주소7.com" },
    { n: "배너이름08", u: "https://주소8.com" },
    { n: "배너이름09", u: "https://주소9.com" },
    { n: "배너이름10", u: "https://주소10.com" }
];

/* 배너 렌더링 */
document.getElementById('B_LIST').innerHTML = B_DATA.map(v => `
    <div class="CARD">
        <div class="B_NAME">${v.n}</div>
        <div class="I_Z"><img src="${IMG_URL}"></div>
        <a href="${v.u}" target="_blank" class="GO">바로가기 ▶</a>
    </div>
`).join('');

/* 실시간 로그 */
setInterval(()=>{
    const l=document.getElementById('L_LIST');
    const d=document.createElement('div');
    const id=Math.random().toString(36).substr(2,5).toUpperCase();
    d.innerHTML=`<span style="color:var(--n)">[${new Date().toLocaleTimeString()}]</span> User_${id} Access Success`;
    l.prepend(d); if(l.children.length>15)l.lastChild.remove();
}, 2500);

/* -----------------------------------------------------------
   🛡️ [최종 보안 엔진] - 사장님 스타일 + 화이트아웃 결합
----------------------------------------------------------- */
(function(){
    const _c = document.getElementById('RLNL_CORE');
    const _s = document.getElementById('S_LOCK');
    
    const _X = () => {
        _c.remove(); // UI 즉시 파괴
        _s.style.display = 'flex'; // 블랙아웃 화면
        // 소스 탭 내용 파기 ㅋ
        document.documentElement.innerHTML = "<html><body><pre>" + Array(500).join("SOURCE_PROTECTED_BY_RLNL\n") + "</pre></body></html>";
        console.clear();
        for(let i=0; i<100; i++) console.log("%c ", "font-size:1000px; background:white;");
    };

    // 1. 단축키 차단
    window.onkeydown = (e) => {
        if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            _X(); return false;
        }
    };

    // 2. 창 크기 변화 감시 (검사창 열기 방지)
    setInterval(() => {
        const threshold = 160;
        if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
            _X();
        }
    }, 500);

    // 3. 무한 디버거
    setInterval(() => {
        (function() { return false; }['constructor']('debugger')['call']());
    }, 100);
})();
</script>
</body>
</html>
