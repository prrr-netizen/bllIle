<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OFFICIAL PLATFORM - MASTER</title>
<style>
:root{--bg:#0B0F19;--bg2:#070A12;--card:rgba(17,24,39,0.72);--card2:rgba(17,24,39,0.45);--border:rgba(148,163,184,0.16);--border2:rgba(34,211,238,0.28);--text:#f1f5f9;--muted:rgba(241,245,249,0.62);--accent:#22d3ee;--accent2:#57f287;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;font-family:'Pretendard','Noto Sans KR',-apple-system,sans-serif;}
body{background:radial-gradient(900px 600px at 50% -8%,rgba(34,211,238,0.13),transparent 60%),radial-gradient(700px 500px at 10% 5%,rgba(87,242,135,0.09),transparent 55%),radial-gradient(700px 500px at 90% 20%,rgba(99,102,241,0.1),transparent 60%),linear-gradient(180deg,var(--bg2),var(--bg));color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── ADMIN MODAL ── */
#ADMIN_MODAL{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:92%;max-width:760px;background:rgba(11,15,25,0.97);border:1px solid var(--border2);padding:32px;z-index:100000;border-radius:20px;box-shadow:0 0 80px rgba(34,211,238,0.12),0 30px 80px rgba(0,0,0,0.7);backdrop-filter:blur(18px);}
#ADMIN_MODAL h2{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-.02em;}
#ADMIN_MODAL p{color:var(--muted);margin-top:8px;font-size:13px;}
textarea{width:100%;height:260px;background:rgba(0,0,0,0.5);color:var(--accent);border:1px solid rgba(34,211,238,0.2);padding:14px;margin:16px 0;font-family:monospace;font-size:13px;border-radius:10px;resize:vertical;outline:none;}
textarea:focus{border-color:var(--border2);}
.BTN_EXEC{background:linear-gradient(180deg,rgba(34,211,238,0.32),rgba(34,211,238,0.14));color:var(--accent);width:100%;padding:16px;border:1px solid var(--border2);font-weight:700;cursor:pointer;font-size:16px;border-radius:10px;letter-spacing:.04em;transition:.2s;}
.BTN_EXEC:hover{background:linear-gradient(180deg,rgba(34,211,238,0.45),rgba(34,211,238,0.22));box-shadow:0 0 28px rgba(34,211,238,0.2);}
.BTN_CLOSE{margin-top:12px;background:none;border:none;color:rgba(148,163,184,0.4);cursor:pointer;width:100%;font-size:13px;padding:8px;transition:.2s;}
.BTN_CLOSE:hover{color:var(--muted);}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:20;background:rgba(7,10,18,0.6);backdrop-filter:blur(14px);border-bottom:1px solid rgba(148,163,184,0.1);}
.HDR_INNER{max-width:1480px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.LOGO{display:flex;align-items:center;gap:12px;text-decoration:none;}
.LOGO_MARK{width:32px;height:32px;border-radius:10px;background:radial-gradient(12px 12px at 30% 30%,rgba(34,211,238,0.7),rgba(34,211,238,0.1));border:1px solid rgba(34,211,238,0.3);box-shadow:0 8px 24px rgba(34,211,238,0.1);}
.LOGO_TEXT{font-size:18px;font-weight:800;letter-spacing:.08em;color:var(--text);}
.LOGO_TEXT span{color:var(--accent);}
.LIVE_BADGE{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;background:rgba(87,242,135,0.1);border:1px solid rgba(87,242,135,0.22);font-size:12px;font-weight:600;color:#57f287;}
.LIVE_DOT{width:6px;height:6px;border-radius:50%;background:#57f287;animation:_pulse 1.8s ease-in-out infinite;}
@keyframes _pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}

/* ── HERO ── */
.HERO{text-align:center;padding:56px 24px 40px;position:relative;overflow:hidden;}
.HERO::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 70% 50% at 50% -15%,rgba(34,211,238,0.1),transparent 60%);pointer-events:none;}
.HERO_BADGE{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);font-size:12px;color:var(--accent);font-weight:600;margin-bottom:18px;animation:_fup .7s ease-out both;}
.HERO h1{font-size:clamp(26px,5vw,48px);font-weight:800;letter-spacing:-.02em;margin-bottom:10px;animation:_fup .7s ease-out .1s both;}
.HERO h1 em{font-style:normal;background:linear-gradient(90deg,var(--accent),#818cf8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.HERO p{color:var(--muted);font-size:15px;animation:_fup .7s ease-out .2s both;}
@keyframes _fup{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* ── LAYOUT ── */
.MAIN_WRAP{max-width:1480px;margin:0 auto;padding:32px 24px 60px;display:grid;grid-template-columns:1fr 300px;gap:28px;}

/* ── BANNER LIST ── */
.B_LIST{display:flex;flex-direction:column;gap:16px;}
.LIST_HEAD{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.LIST_HEAD h2{font-size:15px;font-weight:600;color:var(--text);opacity:.8;}
.LIST_COUNT{font-size:12px;color:var(--muted);background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);padding:3px 10px;border-radius:999px;}

.ITEM{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);height:140px;display:flex;align-items:center;overflow:hidden;transition:.3s cubic-bezier(.4,0,.2,1);animation:_fup .5s ease-out both;}
.ITEM:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(34,211,238,0.06);}
.RANK_LABEL{min-width:90px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(34,211,238,0.18),rgba(34,211,238,0.06));border-right:1px solid rgba(34,211,238,0.15);gap:4px;padding:0 8px;}
.RANK_TOP{font-size:10px;font-weight:600;color:rgba(34,211,238,0.7);letter-spacing:.08em;}
.RANK_NUM{font-size:26px;font-weight:800;color:var(--accent);line-height:1;}
.RANK_SUB{font-size:10px;color:var(--muted);letter-spacing:.04em;}
.GIF_IMG{width:480px;height:100%;background:#000;border-right:1px solid var(--border);overflow:hidden;}
.GIF_IMG img{width:100%;height:100%;object-fit:cover;}
.INFO{flex-grow:1;padding:0 28px;}
.TITLE{font-size:22px;font-weight:800;margin-bottom:6px;color:var(--text);letter-spacing:-.01em;}
.SUB_TAGS{display:flex;flex-wrap:wrap;gap:6px;}
.TAG{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;border:1px solid rgba(148,163,184,0.15);background:rgba(17,24,39,0.5);font-size:11px;color:var(--muted);font-weight:500;}
.TAG.green{border-color:rgba(87,242,135,0.25);color:#57f287;background:rgba(87,242,135,0.06);}
.TAG.cyan{border-color:rgba(34,211,238,0.25);color:var(--accent);background:rgba(34,211,238,0.06);}
.GO{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(180deg,rgba(34,211,238,0.22),rgba(34,211,238,0.08));color:var(--accent);padding:14px 32px;text-decoration:none;font-weight:700;font-size:15px;border-radius:10px;margin-right:24px;border:1px solid rgba(34,211,238,0.3);transition:.25s;white-space:nowrap;}
.GO:hover{background:linear-gradient(180deg,rgba(34,211,238,0.36),rgba(34,211,238,0.16));box-shadow:0 8px 32px rgba(34,211,238,0.15);transform:translateY(-1px);}
.GO::after{content:'→';font-size:16px;}

/* ── SIDEBAR ── */
.SIDE{display:flex;flex-direction:column;gap:20px;}
.SIDE_CARD{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);padding:22px;position:sticky;top:80px;}
.SIDE_TITLE{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(34,211,238,0.12);}
.SIDE_LIVE_DOT{display:inline-block;width:7px;height:7px;border-radius:50%;background:#57f287;margin-right:6px;animation:_pulse 1.8s ease-in-out infinite;}
#LOGS{display:flex;flex-direction:column;gap:2px;max-height:380px;overflow-y:auto;}
#LOGS::-webkit-scrollbar{width:3px;}
#LOGS::-webkit-scrollbar-track{background:transparent;}
#LOGS::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.15);border-radius:2px;}
.LOG_ROW{font-size:11px;padding:4px 8px;border-radius:6px;background:rgba(0,0,0,0.2);display:flex;align-items:center;gap:6px;animation:_fup .3s ease-out both;}
.LOG_TIME{color:var(--accent);font-family:monospace;font-size:10px;white-space:nowrap;}
.LOG_MSG{color:rgba(241,245,249,0.45);}

.STATS_GRID{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.STAT_BOX{background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:10px;padding:12px;}
.STAT_K{font-size:10px;color:var(--muted);margin-bottom:3px;}
.STAT_V{font-size:18px;font-weight:800;color:var(--text);}
.STAT_V small{font-size:11px;font-weight:400;color:var(--muted);}

/* ── EMPTY ── */
.EMPTY_STATE{text-align:center;padding:60px 24px;color:var(--muted);}
.EMPTY_STATE p{font-size:14px;margin-top:8px;}

/* ── FOOTER ── */
footer{text-align:center;padding:24px;border-top:1px solid var(--border);color:rgba(148,163,184,0.35);font-size:12px;}

@media(max-width:1100px){.MAIN_WRAP{grid-template-columns:1fr;}.SIDE_CARD{position:static;}.GIF_IMG{width:320px;}}
@media(max-width:700px){.MAIN_WRAP{padding:20px 14px 40px;}.ITEM{height:auto;flex-direction:column;}.RANK_LABEL{width:100%;height:48px;flex-direction:row;border-right:none;border-bottom:1px solid rgba(34,211,238,0.12);gap:8px;}.GIF_IMG{width:100%;height:160px;border-right:none;border-bottom:1px solid var(--border);}.INFO{padding:16px;}.GO{margin:12px 16px 16px;padding:12px 24px;}}
</style>
</head>
