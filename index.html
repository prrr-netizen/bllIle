<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLDEN ELITE | PRIVATE NETWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+KR:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10, 15, 25, 0.98); --l: rgba(0, 255, 204, 0.4); --r: #ff0033; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; font-family:'Inter', 'Noto Sans KR', sans-serif; }
        body { background:var(--b); color:#fff; min-height:100vh; overflow-x:hidden; }
        
        /* [보안] 은폐 시 나타날 화면 */
        #S_LOCK { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999999; flex-direction:column; align-items:center; justify-content:center; color:var(--r); font-weight:900; font-size:22px; }

        /* 헤더 & 네비 */
        .TOP_BAR { background: #000; padding: 10px 0; border-bottom: 1px solid #111; font-size: 12px; color: #888; }
        .C { max-width:1300px; margin:0 auto; padding:0 20px; }
        .FLEX { display: flex; justify-content: space-between; align-items: center; }
        .H { position:sticky; top:0; z-index:1000; background:rgba(2,4,8,0.95); backdrop-filter:blur(20px); border-bottom:2px solid var(--n); padding:20px 0; }
        .L { font-size:28px; font-weight:900; cursor:pointer; letter-spacing:-1px; }
        .L span { color:var(--n); text-shadow:0 0 15px var(--n); }
        .CS_BTNS a { text-decoration: none; color: #000; background: var(--n); padding: 10px 20px; border-radius: 5px; font-weight: 900; margin-left: 10px; font-size: 14px; }
        
        /* 메인 그리드 */
        .MAIN_LAYOUT { display: grid; grid-template-columns: 1fr 350px; gap: 30px; margin: 40px 0; }
        .GRID { display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; }
        .CARD { background:var(--p); border:1px solid var(--l); border-radius:15px; overflow:hidden; transition:0.4s; position: relative; }
        .CARD:hover { transform:translateY(-10px); border-color:var(--n); box-shadow:0 15px 40px rgba(0,255,204,0.2); }
        .IMG_BOX { width:100%; height:180px; background:#000; position: relative; }
        .IMG_BOX img { width:100%; height:100%; object-fit:cover; opacity: 0.7; }
        .BADGE { position: absolute; top: 10px; right: 10px; background: var(--r); color: #fff; padding: 4px 8px; font-size: 10px; font-weight: 900; border-radius: 3px; }
        .INFO { padding: 25px; text-align: center; }
        .NAME { font-size:19px; font-weight:900; margin-bottom: 20px; color: var(--n); }
        .LINK_BTN { display: block; width:100%; padding:15px; background:transparent; border:1px solid var(--n); color:var(--n); border-radius:8px; font-weight:900; cursor:pointer; text-decoration: none; transition: 0.3s; }
        .LINK_BTN:hover { background:var(--n); color:#000; }

        /* 사이드바 로그 */
        .SIDE_BOX { background: #0a0f19; border: 1px solid #1a2233; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .SIDE_TITLE { font-size: 14px; font-weight: 900; color: var(--n); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .LOG_LIST { height: 300px; overflow: hidden; font-size: 13px; color: #ccc; line-height: 2.2; }
        .LOG_ITEM { border-bottom: 1px solid #111; padding: 5px 0; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 1000px) { .MAIN_LAYOUT { grid-template-columns: 1fr; } .GRID { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body oncontextmenu="return false">

<div id="S_LOCK">
    <div>⚠️ SECURITY BREACH DETECTED ⚠️</div>
    <p style="font-size:14px; color:#444; margin-top:15px; font-weight:400;">데이터 보호를 위해 소스 코드가 즉시 파기되었습니다.</p>
</div>

<div id="W_MAIN">
    <div class="TOP_BAR">
        <div class="C FLEX">
            <div id="REAL_TIME">LOADING TIME...</div>
            <div>STATUS: <span style="color:var(--n)">● SERVER ONLINE</span></div>
        </div>
    </div>

    <header class="H">
        <div class="C FLEX">
            <div class="L" onclick="location.reload()">GOLDEN<span>ELITE</span></div>
            <div class="CS_BTNS">
                <a href="https://t.me/your_id" target="_blank" style="background:#24A1DE; color:#fff;">텔레그램 문의</a>
                <a href="#" onclick="alert('카카오톡 상담 연결중...')">카카오톡 문의</a>
            </div>
        </div>
    </header>

    <main class="C MAIN_LAYOUT">
        <section class="GRID" id="BANNER_RENDER"></section>

        <aside>
            <div class="SIDE_BOX">
                <div class="SIDE_TITLE">실시간 접속 현황 <span id="USER_COUNT">2,481명</span></div>
                <div class="LOG_LIST" id="LIVE_LOG"></div>
            </div>
            <div class="SIDE_BOX" style="text-align:center;">
                <p style="color:#555; font-size:12px;">Copyright 2026 GOLDEN ELITE.<br>All Rights Reserved.</p>
            </div>
        </aside>
    </main>
</div>

<script>
    /* [1. 실전 배너 데이터] n:이름, i:이미지, u:이동링크, b:뱃지텍스트 */
    const _ITEMS = [
        {n:"STAKE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=STAKE", u:"https://stake.com", b:"인기"},
        {n:"ROOBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ROOBET", u:"#", b:"신규"},
        {n:"1XBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=1XBET", u:"#", b:"이벤트"},
        {n:"BC.GAME", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=BC.GAME", u:"#", b:"HOT"},
        {n:"TITAN", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=TITAN", u:"#", b:"추천"},
        {n:"EMPIRE", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=EMPIRE", u:"#", b:"보증"},
        {n:"SKYBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=SKYBET", u:"#", b:"등급"},
        {n:"ACEBET", i:"https://via.placeholder.com/400x280/0a0f19/00ffcc?text=ACEBET", u:"#", b:"VIP"}
    ];

    // 배너 렌더링 루프
    const _target = document.getElementById('BANNER_RENDER');
    _target.innerHTML = _ITEMS.map(v => `
        <div class="CARD">
            <div class="IMG_BOX">
                <span class="BADGE">${v.b}</span>
                <img src="${v.i}">
            </div>
            <div class="INFO">
                <div class="NAME">${v.n}</div>
                <a href="${v.u}" class="LINK_BTN" target="_blank">사이트 입장하기</a>
            </div>
        </div>
    `).join('');

    /* [2. 실시간 연출 로직] */
    // 시계 업데이트
    setInterval(() => {
        const now = new Date();
        document.getElementById('REAL_TIME').innerText = now.toLocaleString('ko-KR') + " (UTC+9)";
    }, 1000);

    // 실시간 로그 생성기
    const _names = ["김*수", "이*정", "박*철", "최*현", "정*우", "S*p", "V*p", "A*d"];
    const _actions = ["입장 완료", "충전 신청", "환전 완료", "인증 성공"];
    setInterval(() => {
        const log = document.getElementById('LIVE_LOG');
        const newItem = document.createElement('div');
        newItem.className = 'LOG_ITEM';
        newItem.innerHTML = `<span style="color:var(--n)">[확인]</span> ${_names[Math.floor(Math.random()*_names.length)]} 유저님 ${_actions[Math.floor(Math.random()*_actions.length)]}`;
        log.prepend(newItem);
        if(log.children.length > 8) log.lastChild.remove();
        document.getElementById('USER_COUNT').innerText = (2400 + Math.floor(Math.random()*100)) + "명";
    }, 2500);

    /* -----------------------------------------------------------
       🛡️ [최종 보안 엔진] 은폐 및 소스 삭제 (마우스 직접 클릭 대응)
    ----------------------------------------------------------- */
    (function(){
        const _m = document.getElementById('W_MAIN');
        const _s = document.getElementById('S_LOCK');

        // 소스 완전 은폐 함수
        const _X = () => {
            _m.remove(); // 1. 메인 UI 전체를 메모리에서 삭제 (Elements 창에서 사라짐)
            _s.style.display = 'flex'; // 2. 차단 화면만 노출
            document.title = "ACCESS DENIED";
            console.clear();
        };

        // 감지 1: 마우스로 오른쪽 위 점선 -> 개발자 도구 클릭 (창 크기 변화 감지)
        window.addEventListener('resize', () => {
            const _diffW = window.outerWidth - window.innerWidth;
            const _diffH = window.outerHeight - window.innerHeight;
            if (_diffW > 160 || _diffH > 160) { _X(); }
        });

        // 감지 2: 키보드 단축키 차단
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); _X();
            }
        });

        // 초기 실행 시 이미 도구가 켜져 있다면 즉시 삭제
        if(window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) { _X(); }

    })();
</script>
</body>
</html>
