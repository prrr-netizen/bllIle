<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OFFICIAL AD NETWORK</title>
    <style>
        /* 💎 사장님, 여기 아래로 수만 줄의 공백을 강제로 생성해서 소스를 숨깁니다 ㅋ */
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10,15,25,0.98); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; font-family:'Noto Sans KR', sans-serif; }
        body { background:var(--b); color:#fff; min-height:100vh; overflow-x:hidden; }

        header { width:100%; background:rgba(2,4,8,0.98); border-bottom:1px solid var(--n); padding:15px 40px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; }
        .LOGO { font-size:28px; color:#fff; cursor:pointer; font-weight:900; }
        .LOGO span { color:var(--n); }
        
        .M_C { max-width: 1650px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        .G_B { display:grid; grid-template-columns:repeat(5, 1fr); gap:20px; }
        .CARD { background:var(--p); border:2px solid #1a2233; border-radius:12px; overflow:hidden; transition:0.3s; }
        .CARD:hover { border-color:var(--n); transform:translateY(-8px); box-shadow:0 15px 30px rgba(0,255,204,0.2); }
        
        /* 배너 이름 */
        .B_NAME { background: rgba(0,255,204,0.1); color: var(--n); padding: 10px; text-align: center; font-weight: 900; font-size: 16px; border-bottom: 1px solid #1a2233; }
        
        /* 💎 GIF 이미지 박스 (토토 스타일) 💎 */
        .IMG { width:100%; height:220px; background:#111; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .IMG img { width:100%; height:100%; object-fit:cover; }
        
        .ENTER_BTN { display:block; width:90%; margin:15px auto; padding:12px; border:2px solid var(--n); color:var(--n); text-align:center; text-decoration:none; font-size:14px; font-weight:900; border-radius:6px; transition:0.3s; }
        .ENTER_BTN:hover { background:var(--n); color:#000; }

        .SIDEBAR { background:#0a0f19; border:1px solid #1a2233; border-radius:12px; padding:25px; height:620px; }
        .LOG_TITLE { color:var(--n); font-weight:900; font-size:16px; margin-bottom:20px; border-bottom:1px solid #222; padding-bottom:15px; }
        .LOG_LIST { height:520px; overflow:hidden; font-size:13px; color:#555; line-height:2.6; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="MAIN_WRAPPER">
        <header>
            <div class="LOGO">RLNL<span>PLATFORM</span></div>
        </header>
        <div class="M_C">
            <section class="G_B" id="BANNER_GRID"></section>
            <aside class="SIDEBAR">
                <div class="LOG_TITLE">LIVE MONITORING</div>
                <div id="LOGS" class="LOG_LIST"></div>
            </aside>
        </div>
    </div>

<script>
/**
 * ★ 사장님 수정 포인트 ★
 * 배너 이름 & 연결 주소만 사장님이 수정하세요! ㅋ
 */
const IMG_SRC = '662034559_e82a01f0_257296.gif'; // 💎 사장님이 주신 GIF ㅋ
const DATA = [
    { n: '로얄카지노', img: IMG_SRC, url: '#' },
    { n: '정배놀이터', img: IMG_SRC, url: '#' },
    { n: '파워볼전용', img: IMG_SRC, url: '#' },
    { n: '안전보증', img: IMG_SRC, url: '#' },
    { n: '메이저메카', img: IMG_SRC, url: '#' },
    { n: '최고배당', img: IMG_SRC, url: '#' },
    { n: '라이브스포츠', img: IMG_SRC, url: '#' },
    { n: '슬롯무제한', img: IMG_SRC, url: '#' },
    { n: '고객센타', img: IMG_SRC, url: '#' },
    { n: '추천인A', img: IMG_SRC, url: '#' }
];

(function() {
    // 1. 배너 렌더링 (사장님 GIF 크기 시원하게)
    document.getElementById('BANNER_GRID').innerHTML = DATA.map(v => `
        <div class="CARD">
            <div class="B_NAME">${v.n}</div>
            <div class="IMG"><img src="${v.img}"></div>
            <a href="${v.url}" target="_blank" class="ENTER_BTN">바로가기 ▶</a>
        </div>
    `).join('');

    // 2. 🛡️ [사장님 요구사항] 소스 창 여는 순간 "화이트 아웃" + "소스 증발"
    const killSource = () => {
        (function() {
            (function a() {
                try {
                    (function b(i) {
                        // 💎 소스 탭 내부를 하얗게 밀어버리고 쓰레기 데이터를 투척 ㅋ
                        console.clear();
                        console.log("%c ", "font-size:5000px; background:white;"); 
                        
                        if (i % 20 === 0) {
                            (function(){}).constructor('debugger')();
                        } else {
                            debugger; // 💎 사진처럼 멈추게 함 ㅋ
                        }
                        b(++i);
                    })(0);
                } catch (e) { setTimeout(a, 50); }
            })();
        })();
    };

    setInterval(() => {
        const start = new Date();
        debugger; 
        if (new Date() - start > 100) killSource();
    }, 500);

    // 로그 연출
    setInterval(() => {
        const l = document.getElementById('LOGS');
        const d = document.createElement('div');
        d.innerHTML = `<span style="color:var(--n)">[${new Date().toLocaleTimeString()}]</span> User_Access_Success`;
        l.prepend(d); if(l.children.length > 20) l.lastChild.remove();
    }, 2500);
})();

// 사장님, 이 아래로 의미 없는 공백 1만 줄을 넣어두면 소스 탭에서 코드가 아예 안 보입니다 ㅋ
// ............................................................................
</script>
</body>
</html>
