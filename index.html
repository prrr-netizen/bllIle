<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RLNL PLATFORM | OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10,15,25,0.98); --l: rgba(0,255,204,0.4); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; -webkit-user-select:none; user-select:none; }
        body { background:var(--b); color:#fff; min-height:100vh; overflow-x:hidden; }

        /* 헤더 - 더 슬림하게 */
        .H_W { width:100%; position:sticky; top:0; z-index:1000; background:rgba(2,4,8,0.98); backdrop-filter:blur(10px); border-bottom:1px solid var(--n); padding:10px 0; }
        .C_H { max-width:1400px; margin:0 auto; padding:0 20px; display:flex; justify-content:space-between; align-items:center; }
        .LOGO { font-family:'Black Han Sans', sans-serif; font-size:24px; color:#fff; cursor:pointer; }
        .LOGO span { color:var(--n); }
        
        .AUTH_BT { display:flex; gap:8px; }
        .AUTH_BT a { text-decoration:none; padding:8px 16px; border-radius:4px; font-weight:900; font-size:12px; transition:0.2s; }
        .LGN { border:1px solid var(--n); color:var(--n); }
        .REG { background:var(--n); color:#000; }

        /* 메인 레이아웃 */
        .M_C { max-width: 1400px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
        
        /* 5열 카드 배치 - 배너 크기 축소 */
        .G_B { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; }
        .CARD { background:var(--p); border:1px solid #1a2233; border-radius:8px; overflow:hidden; text-align:center; padding-bottom:15px; transition:0.2s; }
        .CARD:hover { border-color:var(--n); transform:translateY(-4px); }
        
        /* 배너 이미지 영역 슬림화 (높이 90px) */
        .IMG_P { width:100%; height:90px; background:#111; overflow:hidden; border-bottom:1px solid #1a2233; }
        .IMG_P img { width:100%; height:100%; object-fit:contain; opacity:0.7; padding:10px; transition:0.3s; }
        .CARD:hover .IMG_P img { opacity:1; transform:scale(1.05); }
        
        .NAME { font-size:14px; font-weight:900; margin:10px 0; color:#eee; }
        .GO { display:block; width:85%; margin:0 auto; padding:8px; border:1px solid var(--n); color:var(--n); border-radius:4px; font-weight:900; text-decoration:none; font-size:11px; transition:0.2s; }
        .GO:hover { background:var(--n); color:#000; }

        /* 실시간 로그 사이드바 슬림화 */
        .S_B { background:#0a0f19; border:1px solid #1a2233; border-radius:8px; padding:15px; height:450px; position:sticky; top:80px; }
        .L_W { height:380px; overflow:hidden; font-size:11px; color:#444; line-height:2.2; border-top:1px solid #111; padding-top:10px; }

        /* 반응형 */
        @media (max-width: 1200px) { .G_B { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .M_C { grid-template-columns: 1fr; } .G_B { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body oncontextmenu="return false">

    <header class="H_W">
        <div class="C_H">
            <div class="LOGO" onclick="location.reload()">RLNL<span>PLATFORM</span></div>
            <div class="AUTH_BT">
                <a href="#" class="LGN">LOGIN</a>
                <a href="#" class="REG">JOIN</a>
            </div>
        </div>
    </header>

    <div class="M_C">
        <section class="G_B" id="B_LIST"></section>
        <aside>
            <div class="S_B">
                <div style="font-weight:900; color:var(--n); font-size:12px; margin-bottom:10px;">LIVE ACTIVITY</div>
                <div class="L_W" id="L_LIST"></div>
            </div>
        </aside>
    </div>

<script>
const B_DATA = ['STAKE','ROOBET','1XBET','BC.GAME','TITAN','EMPIRE','ACEBET','SKYBET','KINGBET','STARBET'];

(function INIT_SITE(){
    document.getElementById('B_LIST').innerHTML = B_DATA.map(v => `
        <div class="CARD">
            <div class="IMG_P"><img src="https://via.placeholder.com/200x100/111/00ffcc?text=${v}"></div>
            <div class="NAME">${v}</div>
            <a href="#" class="GO">ENTER</a>
        </div>
    `).join('');
    
    START_SECURITY();
    START_LOGS();
})();

/* 🛡️ 소스 보기 시 즉시 자폭 엔진 (점선 메뉴 포함) */
function START_SECURITY(){
    const KILL = () => {
        document.body.innerHTML = "";
        window.location.replace("about:blank");
    };

    // 1. 단축키 차단 (F12, Ctrl+U 등)
    window.addEventListener('keydown', (e) => {
        if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault();
            KILL();
        }
    });

    // 2. 점선 메뉴/마우스 클릭 대응 (창 크기 감지)
    setInterval(() => {
        if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
            KILL();
        }
    }, 100);

    // 3. 무한 디버거
    setInterval(() => { (function(){return false}['constructor']('debugger')['call']()); }, 50);
}

function START_LOGS(){
    setInterval(()=>{
        const l = document.getElementById('L_LIST');
        const d = document.createElement('div');
        const id = Math.random().toString(36).substr(2, 4).toUpperCase();
        d.innerHTML = `<span style="color:var(--n)">[${new Date().toLocaleTimeString()}]</span> User_${id} OK`;
        l.prepend(d); if(l.children.length > 15) l.lastChild.remove();
    }, 2800);
}
</script>
</body>
</html>
