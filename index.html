<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>디스코드 배너 입점 | 검증된 파트너</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0c1a 0%, #0e1122 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #eef2ff;
            line-height: 1.4;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 28px;
        }

        /* 헤더 */
        .header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 14px 0;
            backdrop-filter: blur(12px);
            background: rgba(10,12,26,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #5865F2, #a88bff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav {
            display: flex;
            gap: 28px;
            align-items: center;
        }

        .nav a {
            color: #b9c7d9;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav a:hover {
            color: #5865F2;
        }

        .header-btn {
            background: #5865F2;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .header-btn:hover {
            background: #4752c4;
            transform: scale(0.97);
        }

        /* 실시간 시계 */
        .clock-container {
            text-align: center;
            padding: 18px 0 8px;
        }

        .live-clock {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(88,101,242,0.1);
            backdrop-filter: blur(8px);
            padding: 5px 22px;
            border-radius: 60px;
            border: 1px solid rgba(88,101,242,0.3);
        }

        .clock-time {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* 히어로 - 텍스트 줄이고 돋보이게 */
        .hero {
            text-align: center;
            padding: 28px 0 24px;
        }

        .hero h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #b9a9ff, #8b74ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .hero .sub {
            font-size: 0.9rem;
            color: #aab4d0;
            letter-spacing: -0.2px;
        }

        /* 통계 - 컴팩트하게 */
        .stats {
            display: flex;
            justify-content: center;
            gap: 36px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.03);
            padding: 6px 20px;
            border-radius: 50px;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #5865F2;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #8a9bb5;
        }

        /* 배너 섹션 */
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            margin: 20px 0 20px;
        }

        .banner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .banner-card {
            background: #0f1424;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #1e2a3a;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .banner-card:hover {
            transform: translateY(-4px);
            border-color: #5865F2;
        }

        .banner-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #1a1f35, #0f1424);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .banner-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-image .placeholder {
            font-size: 2.2rem;
            color: #5865F2;
        }

        .banner-info {
            padding: 16px;
        }

        .banner-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .verify-badge {
            background: #1f3a2c;
            color: #8bd96b;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .banner-desc {
            color: #9aaec5;
            font-size: 0.8rem;
            margin: 8px 0;
        }

        .btn-banner {
            background: #5865F2;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 10px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .btn-banner:hover {
            background: #4752c4;
        }

        .footer {
            border-top: 1px solid #1a1f2e;
            padding: 24px 0;
            text-align: center;
            color: #6a7c9e;
            font-size: 0.7rem;
        }

        @media (max-width: 720px) {
            .hero h1 {
                font-size: 1.4rem;
            }
            .nav {
                gap: 16px;
            }
            .header-btn {
                padding: 6px 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo">🎯 BANNER MARKET</div>
        <div class="nav">
            <a id="allBannerNavBtn">🏷️ 전체 배너 (9개)</a>
            <a id="applyNavBtn">📝 입점신청</a>
            <a href="#">검증기준</a>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="clock-container">
            <div class="live-clock">
                <span>🕒</span>
                <span class="clock-time" id="kstTime">--:--:--</span>
                <span>KST</span>
            </div>
        </div>

        <div class="hero">
            <h1>검증된 디스코드 업체<br>배너 광고 플랫폼</h1>
            <div class="sub">신뢰할 수 있는 파트너사만 엄선합니다</div>
            <div class="stats">
                <div class="stat-item"><div class="stat-number">12+</div><div class="stat-label">입점 업체</div></div>
                <div class="stat-item"><div class="stat-number">99%</div><div class="stat-label">검증 통과율</div></div>
                <div class="stat-item"><div class="stat-number">24/7</div><div class="stat-label">모니터링</div></div>
            </div>
        </div>

        <h2 class="section-title">🏆 검증된 배너 파트너</h2>
        <div class="banner-grid" id="bannerGrid"></div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>© BANNER MARKET — 검증된 디스코드 파트너사만 입점합니다</p>
    </div>
</footer>

<script>
    // 실시간 시계
    function updateClock() {
        const now = new Date();
        const kstNow = new Date(now.getTime() + (9 * 60 * 60 * 1000));
        document.getElementById('kstTime').textContent = 
            `${String(kstNow.getUTCHours()).padStart(2,'0')}:${String(kstNow.getUTCMinutes()).padStart(2,'0')}:${String(kstNow.getUTCSeconds()).padStart(2,'0')}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ============================================================
    // 👇 관리자 배너 설정 (imgUrl에 GIF/이미지 URL 입력)
    // ============================================================
    let banners = [
        { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example1" },
        { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example2" },
        { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example3" }
    ];

    let isExpanded = false;

    function renderBanners() {
        const grid = document.getElementById('bannerGrid');
        grid.innerHTML = '';
        banners.forEach((banner, idx) => {
            const card = document.createElement('div');
            card.className = 'banner-card';
            card.setAttribute('data-url', banner.link);
            
            const imageHtml = banner.imgUrl && banner.imgUrl.trim() !== ""
                ? `<img src="${banner.imgUrl}" alt="${banner.name} 배너" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'placeholder\'>🎯</div>';">`
                : `<div class="placeholder">${['🎯', '🎮', '💎'][idx % 3]}</div>`;
            
            card.innerHTML = `
                <div class="banner-image">${imageHtml}</div>
                <div class="banner-info">
                    <div class="banner-name">
                        ${banner.name}
                        <span class="verify-badge">검증완료</span>
                    </div>
                    <div class="banner-desc">${banner.desc}</div>
                    <button class="btn-banner">배너 바로가기</button>
                </div>
            `;
            
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-banner')) return;
                if (banner.link && !banner.link.includes('example')) {
                    window.open(banner.link, '_blank');
                } else {
                    alert('🔜 준비 중인 배너입니다.');
                }
            });
            
            const btn = card.querySelector('.btn-banner');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (banner.link && !banner.link.includes('example')) {
                    window.open(banner.link, '_blank');
                } else {
                    alert('🔜 준비 중인 배너입니다.');
                }
            });
            
            grid.appendChild(card);
        });
    }

    // 전체보기 기능 (헤더 버튼 & 기존 기능 통합)
    function expandAllBanners() {
        if (!isExpanded) {
            const additional = [
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example4" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example5" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example6" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example7" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example8" },
                { imgUrl: "", name: "배너 준비중", desc: "", link: "https://discord.gg/example9" }
            ];
            banners = [...banners, ...additional];
            isExpanded = true;
            renderBanners();
            
            // 버튼 텍스트 업데이트
            const allBtn = document.getElementById('allBannerNavBtn');
            if (allBtn) allBtn.textContent = '🏷️ 전체 배너 (9개) ✅';
        } else {
            alert('✅ 이미 9개의 모든 배너가 표시되고 있습니다.');
        }
    }

    // 입점신청 알림
    function showApplyAlert() {
        alert('📢 배너 입점 문의\n\n검증된 디스코드 업체만 입점 가능합니다.\n자세한 문의는 관리자에게 연락해주세요.');
    }

    // 헤더 버튼 연결
    document.getElementById('allBannerNavBtn').addEventListener('click', expandAllBanners);
    document.getElementById('applyNavBtn').addEventListener('click', showApplyAlert);

    renderBanners();
</script>
</body>
</html>
