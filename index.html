<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OFFICIAL PLATFORM</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00ffcc; --b: #020408; --p: rgba(10,15,25,0.98); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; -webkit-user-select:none; user-select:none; }
        body { background:var(--b); color:#fff; min-height:100vh; overflow-x:hidden; }

        /* [1] 헤더 */
        header { width:100%; background:rgba(2,4,8,0.98); border-bottom:1px solid var(--n); padding:12px 30px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; }
        .LOGO { font-family:'Black Han Sans', sans-serif; font-size:24px; color:#fff; cursor:pointer; }
        .LOGO span { color:var(--n); }
        
        /* [2] 메인 레이아웃 (5열 배너) */
        .M_C { max-width: 1450px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .G_B { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; }
        .CARD { background:var(--p); border:1px solid #1a2233; border-radius:8px; overflow:hidden; transition:0.3s; position:relative; }
        .CARD:hover { border-color:var(--n); transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,255,204,0.15); }
        
        .IMG { width:100%; height:130px; background:#111; display:flex; align-items:center; justify-content:center; overflow:hidden; border-bottom:1px solid #1a2233; }
        .IMG img { width:100%; height:100%; object-fit:cover; opacity:0.85; transition:0.4s; }
        
        .ENTER_BTN { display:block; width:90%; margin:12px auto; padding:10px; border:1px solid var(--n); color:var(--n); text-align:center; text-decoration:none; font-size:12px; font-weight:900; border-radius:4px; }
        .ENTER_BTN:hover { background:var(--n); color:#000; }

        /* [3] 실시간 상담 플로팅 버튼 */
        .CS_FLOAT { position:fixed; bottom:30px; right:30px; z-index:9999; display:flex; flex-direction:column; gap:12px; }
        .CS_BTN { width:65px; height:65px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:11px; font-weight:900; box-shadow:0 8px 20px rgba(0,0,0,0.6); transition:0.3s; animation: pulse 2s infinite; }
        .TELE { background:#0088cc; color:#fff; }
        .KAKA { background:#FEE500; color:#000; }

        /* [4] 사이드바 로그 */
        .SIDEBAR { background:#0a0f19; border:1px solid #1a2233; border-radius:10px; padding:20px; height:520px; position:sticky; top:110px; }
        .LOG_TITLE { color:var(--n); font-weight:900; font-size:14px; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px; }
        .LOG_LIST { height:420px; overflow:hidden; font-size:12px; color:#444; line-height:2.4; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="NORMAL_VIEW">
        <header>
            <div class="LOGO" onclick="location.reload()">RLNL<span>PLATFORM</span></div>
        </header>

        <div class="M_C">
            <section class="G_B" id="BANNER_CONTAINER"></section>
            <aside class="SIDEBAR">
                <div class="LOG_TITLE">LIVE SERVER ACTIVITY</div>
                <div class="LOG_LIST" id="LOG_CONTAINER"></div>
            </aside>
        </div>

        <div class="CS_FLOAT">
            <a href="텔레주소" target="_blank" class="CS_BTN TELE">TELEGRAM</a>
            <a href="카톡주소" target="_blank" class="CS_BTN KAKA">KAKAO</a>
        </div>
    </div>

<script>
/**
 * ★ 사장님 수정 포인트 ★
 */
const B_DATA = [
    { logo: '배너1.gif', url: 'https://주소1.com' },
    { logo: '배너2.gif', url: 'https://주소2.com' },
    { logo: '배너3.gif', url: 'https://주소3.com' },
    { logo: '배너4.gif', url: 'https://주소4.com' },
    { logo: '배너5.gif', url: 'https://주소5.com' },
    { logo: '배너6.gif', url: 'https://주소6.com' },
    { logo: '배너7.gif', url: 'https://주소7.com' },
    { logo: '배너8.gif', url: 'https://주소8.com' },
    { logo: '배너9.gif', url: 'https://주소9.com' },
    { logo: '배너10.gif', url: 'https://주소10.com' }
];

(function INIT(){
    document.getElementById('BANNER_CONTAINER').innerHTML = B_DATA.map(item => `
        <div class="CARD">
            <div class="IMG"><img src="${item.logo}" onerror="this.src='https://via.placeholder.com/250x130/111/00ffcc?text=BANNER_GIF'"></div>
            <a href="${item.url}" target="_blank" class="ENTER_BTN">ENTER SITE</a>
        </div>
    `).join('');
    
    START_ANTI_DEBUG(); // 💎 소스 창만 조지는 기술 ㅋ
    START_LOGS();
})();

/* 🛡️ 사장님이 원하신 "사진처럼 소스 창만 막기" 기술 */
function START_ANTI_DEBUG() {
    // 1. 디버거 무한 폭탄 (Sources 탭에서 무한 정지 유발) ㅋ
    const killer = function() {
        (function() {
            (function a() {
                try {
                    (function b(i) {
                        if (i % 20 === 0 || i % 10 === 0) {
                            (function() {}).constructor('debugger')();
                        } else {
                            debugger; // 💎 이 부분이 사진처럼 소스 창을 멈추게 함 ㅋ
                        }
                        b(++i);
                    })(0);
                } catch (e) {
                    setTimeout(a, 100);
                }
            })();
        })();
    };

    // 2. 개발자 도구 감지 시 무한 루프 실행
    setInterval(() => {
        const start = new Date();
        debugger; // 소스 창 열려있으면 여기서 멈춤 ㅋ
        const end = new Date();
        if (end - start > 100) {
            // 소스 창 열린 거 확인되면 무한 루프 가동 ㅋ
            killer();
        }
    }, 500);

    // 3. 우클릭/단축키는 기본 매너로 막아둠 ㅋ
    window.addEventListener('keydown', (e) => {
        if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault();
        }
    });
}

function START_LOGS(){
    setInterval(()=>{
        const c = document.getElementById('LOG_CONTAINER');
        const d = document.createElement('div');
        const id = Math.random().toString(36).substr(2, 5).toUpperCase();
        d.innerHTML = `<span style="color:var(--n)">[${new Date().toLocaleTimeString()}]</span> User_${id} OK`;
        c.prepend(d); if(c.children.length > 20) c.lastChild.remove();
    }, 2000);
}
</script>
</body>
</html>
